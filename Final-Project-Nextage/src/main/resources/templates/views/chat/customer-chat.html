<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">

<div layout:fragment="content">
    <style>
        .chat-page-container { max-width: 1200px; margin: 40px auto; display: flex; height: 750px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; }
        .chat-sidebar { width: 320px; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid #eee; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .chat-item.active { background: #e7f1ff; border-left: 5px solid #0d6efd; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-row { display: flex; align-items: flex-end; width: 100%; margin-bottom: 5px; }
        .msg-row.right { flex-direction: row-reverse; }
        .msg-row.left { flex-direction: row; }
        
        .msg-bubble { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; word-break: break-all; }
        .msg-right { background: #0d6efd; color: #fff; border-bottom-right-radius: 2px; }
        .msg-left { background: #fff; border: 1px solid #ddd; color: #333; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 11px; color: #999; margin: 0 8px; white-space: nowrap; }
        
        .chat-footer .input-group { align-items: center; }
        .photo-btn { background: none; border: none; padding: 0 10px; cursor: pointer; color: #6c757d; font-size: 1.5rem; }
        .photo-btn:hover { color: #0d6efd; }
        #messageInput { border-radius: 20px; padding: 10px 15px; border: 1px solid #ced4da; }
        .send-btn { border-radius: 20px; padding: 10px 20px; margin-left: 5px; }
        #imagePreviewContainer { display: none; padding: 10px; border-top: 1px solid #eee; background: #f9f9f9; position: relative; }
        #imagePreview { max-width: 100px; max-height: 100px; border-radius: 8px; border: 1px solid #ddd; }
        #clearImageBtn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .msg-image-only { background: transparent !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
    </style>

    <div class="chat-page-container shadow-sm">
        <div class="chat-sidebar">
            <div class="sidebar-header">나의 대화</div>
            <div class="chat-list" id="chatListContainer">
                <div th:each="room : ${myRooms}" 
                     class="chat-item" 
                     th:id="'room-item-' + ${room.roomId}"
                     th:classappend="${currentRoomId != null && room.roomId == currentRoomId ? 'active' : ''}"
                     th:onclick="|location.href='/chat?roomId=' + ${room.roomId}|">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold" th:text="${room.partnerName}"></span>
                        <div>
                            <span th:if="${room.unreadCount != null and room.unreadCount > 0}" 
                                  class="badge bg-danger rounded-pill me-1" 
                                  th:id="'unread-count-' + ${room.roomId}" 
                                  th:text="${room.unreadCount}"></span>
                            <span th:unless="${room.unreadCount != null and room.unreadCount > 0}" 
                                  class="badge bg-danger rounded-pill me-1" 
                                  th:id="'unread-count-' + ${room.roomId}" 
                                  style="display: none;">0</span>
                            <small th:id="'room-time-' + ${room.roomId}" th:text="${room.lastMessageTime}"></small>
                        </div>
                    </div>
                    <div class="text-muted small text-truncate mt-1" th:id="'room-msg-' + ${room.roomId}" th:text="${room.lastMessage}"></div>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-body" id="chatBody">
                <div th:each="msg : ${messages}" 
                     class="msg-row"
                     th:classappend="${msg.senderType == 'CUSTOMER' ? 'right' : 'left'}"
                     th:attr="data-id=${msg.messageId}">
                    <div class="msg-bubble" th:classappend="${(msg.senderType == 'CUSTOMER' ? 'msg-right' : 'msg-left') + (msg.messageType == 'IMAGE' ? ' msg-image-only' : '')}">
                        <div th:if="${msg.messageType == 'IMAGE'}">
                            <img th:src="${msg.content}" style="max-width: 200px; border-radius: 8px;">
                        </div>
                        <span th:if="${msg.messageType != 'IMAGE'}" th:text="${msg.content}"></span>
                    </div>
                    <span class="msg-time" th:text="${msg.sendAt}"></span>
                </div>
                <div th:if="${currentRoomId == null}" class="m-auto text-muted">
                    대화방을 선택해 주세요.
                </div>
            </div>

            <div id="imagePreviewContainer">
                <img id="imagePreview" src="" alt="미리보기">
                <button id="clearImageBtn" onclick="clearImagePreview()">X</button>
            </div>

            <div class="chat-footer p-3 bg-white border-top" th:if="${currentRoomId != null}">
                <div class="input-group">
                    <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="previewFile()">
                    <button class="photo-btn" onclick="document.getElementById('fileInput').click()">&#128247;</button> 
                    <input type="text" id="messageInput" class="form-control" placeholder="메시지를 입력하세요...">
                    <button class="btn btn-primary send-btn" onclick="sendMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        const chatBody = document.getElementById('chatBody');
        let stompClient = null;
        const currentRoomId = /*[[${currentRoomId}]]*/ null; 
        const myId = /*[[${myId}]]*/ null; 
        const userType = /*[[${userType}]]*/ '';
        let selectedFile = null;
        let oldestMessageId = null;
        let isFetching = false;
        let hasMoreMessages = true;

        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/sub/chat/user/' + userType + '/' + myId, function (message) {
                    const receivedMessage = JSON.parse(message.body);
                    const now = new Date();
                    const timeString = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                    updateSidebar(receivedMessage.roomId, receivedMessage.content, timeString, false, receivedMessage.messageType);
                });

                if (currentRoomId) {
                    stompClient.subscribe('/sub/chat/room/' + currentRoomId, function (message) {
                        const receivedMessage = JSON.parse(message.body);
                        appendMessageToScreen(receivedMessage);
                    });
                }
            });
        }

        function previewFile() {
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const previewImage = document.getElementById('imagePreview');
            selectedFile = fileInput.files[0];

            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewContainer.style.display = 'block';
                }
                reader.readAsDataURL(selectedFile);
            } else {
                clearImagePreview();
            }
        }

        function clearImagePreview() {
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const previewImage = document.getElementById('imagePreview');
            fileInput.value = '';
            selectedFile = null;
            previewImage.src = '';
            previewContainer.style.display = 'none';
        }

        function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            if(!inputElement) return;
            const content = inputElement.value;

            if (selectedFile) {
                const formData = new FormData();
                formData.append("file", selectedFile);

                fetch('/chat/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if(!response.ok) throw new Error();
                    return response.text();
                })
                .then(fileUrl => {
                    if(stompClient) {
                        const chatMessageDTO = {
                            roomId: currentRoomId,
                            senderId: myId,
                            senderType: 'CUSTOMER',
                            messageType: 'IMAGE',
                            content: fileUrl
                        };
                        stompClient.send("/pub/chat/send", {}, JSON.stringify(chatMessageDTO));
                    }
                    clearImagePreview();
                    if(content && stompClient) {
                         sendTextMessage(content);
                         inputElement.value = '';
                    }
                })
                .catch(error => alert('업로드 실패'));
            } else if (content && stompClient) {
                sendTextMessage(content);
                inputElement.value = ''; 
            }
        }

        function sendTextMessage(content) {
            const chatMessageDTO = {
                roomId: currentRoomId,
                senderId: myId,
                senderType: 'CUSTOMER',
                messageType: 'TEXT',
                content: content
            };
            stompClient.send("/pub/chat/send", {}, JSON.stringify(chatMessageDTO));
        }

        function appendMessageToScreen(message) {
            if(!chatBody) return;
            const row = document.createElement('div');
            row.classList.add('msg-row');
            const isMyMessage = (message.senderId === myId && message.senderType === 'CUSTOMER');
            
            if(isMyMessage) {
                row.classList.add('right');
            } else {
                row.classList.add('left');
            }

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            if(isMyMessage) {
                bubble.classList.add('msg-right');
            } else {
                bubble.classList.add('msg-left');
            }

            if (message.messageType === 'IMAGE') {
                bubble.classList.add('msg-image-only');
            }
            
            const contentContainer = document.createElement('div');
            if (message.messageType === 'IMAGE') {
                const img = document.createElement('img');
                img.src = message.content;
                img.style.maxWidth = '200px';
                img.style.borderRadius = '8px';
                contentContainer.appendChild(img);
            } else {
                const span = document.createElement('span');
                span.innerText = message.content;
                contentContainer.appendChild(span);
            }
            
            bubble.appendChild(contentContainer);

            const timeSpan = document.createElement('span');
            timeSpan.classList.add('msg-time');
            const now = new Date();
            const timeString = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            timeSpan.innerText = timeString;
            
            row.appendChild(bubble);
            row.appendChild(timeSpan);
            
            chatBody.appendChild(row);
            chatBody.scrollTop = chatBody.scrollHeight;
            
            updateSidebar(message.roomId, message.content, timeString, isMyMessage, message.messageType);
        }

        function prependMessageToScreen(message) {
            if(!chatBody) return;
            const row = document.createElement('div');
            row.classList.add('msg-row');
            row.setAttribute('data-id', message.messageId);
            const isMyMessage = (message.senderId === myId && message.senderType === 'CUSTOMER');
            
            if(isMyMessage) {
                row.classList.add('right');
            } else {
                row.classList.add('left');
            }

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            if(isMyMessage) {
                bubble.classList.add('msg-right');
            } else {
                bubble.classList.add('msg-left');
            }

            if (message.messageType === 'IMAGE') {
                bubble.classList.add('msg-image-only');
            }
            
            const contentContainer = document.createElement('div');
            if (message.messageType === 'IMAGE') {
                const img = document.createElement('img');
                img.src = message.content;
                img.style.maxWidth = '200px';
                img.style.borderRadius = '8px';
                contentContainer.appendChild(img);
            } else {
                const span = document.createElement('span');
                span.innerText = message.content;
                contentContainer.appendChild(span);
            }
            
            bubble.appendChild(contentContainer);

            const timeSpan = document.createElement('span');
            timeSpan.classList.add('msg-time');
            timeSpan.innerText = message.sendAt;
            
            row.appendChild(bubble);
            row.appendChild(timeSpan);
            
            chatBody.insertBefore(row, chatBody.firstChild);
        }

        function updateSidebar(roomId, content, timeString, isMyMessage, messageType) {
            const roomItem = document.getElementById('room-item-' + roomId);
            if(roomItem) {
                const msgSpan = document.getElementById('room-msg-' + roomId);
                const timeSpan = document.getElementById('room-time-' + roomId);
                const badge = document.getElementById('unread-count-' + roomId);
                
                if(msgSpan) msgSpan.innerText = (messageType === 'IMAGE') ? '(사진)' : content;
                if(timeSpan) timeSpan.innerText = timeString;

                if(!isMyMessage && roomId !== currentRoomId) {
                    if(badge) {
                        let currentCount = parseInt(badge.innerText) || 0;
                        badge.innerText = currentCount + 1;
                        badge.style.display = 'inline-block';
                    }
                }

                const chatListContainer = document.getElementById('chatListContainer');
                if(chatListContainer) chatListContainer.prepend(roomItem);
            }
        }

        function fetchPastMessages() {
            if (!currentRoomId || !oldestMessageId) return;
            isFetching = true;
            const previousScrollHeight = chatBody.scrollHeight;

            fetch('/chat/history?roomId=' + currentRoomId + '&lastMessageId=' + oldestMessageId)
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    hasMoreMessages = false;
                    isFetching = false;
                    return;
                }
                oldestMessageId = data[0].messageId;

                data.reverse().forEach(msg => {
                    prependMessageToScreen(msg);
                });

                chatBody.scrollTop = chatBody.scrollHeight - previousScrollHeight;
                isFetching = false;
            })
            .catch(error => {
                isFetching = false;
            });
        }

        window.onload = function() {
            connect();
            const inputEl = document.getElementById('messageInput');
            if (inputEl) {
                inputEl.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') sendMessage();
                });
            }
            if(chatBody) {
                chatBody.scrollTop = chatBody.scrollHeight;
                chatBody.addEventListener('scroll', function() {
                    if (chatBody.scrollTop === 0 && !isFetching && hasMoreMessages) {
                        fetchPastMessages();
                    }
                });
                const rows = document.querySelectorAll('.msg-row[data-id]');
                if (rows.length > 0) {
                    oldestMessageId = rows[0].getAttribute('data-id');
                }
            }
        };
    </script>
</div>
</html>
