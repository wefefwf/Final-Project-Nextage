<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
    <meta charset="UTF-8">
    <title>Nextage | 의뢰 게시판</title>
    <link rel="stylesheet" th:href="@{/css/customerRequest/customerRequestList.css}" />
</head>
<body>
<th:block layout:fragment="content">
    <div class="request-board-container">
        
        <div class="board-header">
            <div class="header-left">
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all">전체</button>
                    
                    <div class="filter-group">
                        <span class="group-label">Clothes</span>
                        <button class="filter-btn" data-category="2D Clothes">2D</button>
                        <button class="filter-btn" data-category="3D Clothes">3D</button>
                    </div>

                    <div class="filter-group">
                        <span class="group-label">Accessories</span>
                        <button class="filter-btn" data-category="3D Object">Object</button>
                        <button class="filter-btn" data-category="Metal">Metal</button>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <!-- ✅ 수정: id, value 추가 + 금액 낮은순 추가 -->
                <select class="form-select-sm sort-select" id="sortSelect">
                    <option value="latest">최신순</option>
                    <option value="price-high">금액 높은순</option>
                    <option value="price-low">금액 낮은순</option>
                </select>
                <a th:href="@{/customer/request/write}" class="write-btn">의뢰하기</a>
            </div>
        </div>

        <div class="request-list">
            <div th:if="${#lists.isEmpty(requestList)}" class="empty-msg">
                <p>등록된 의뢰가 없습니다. 첫 번째 주인공이 되어보세요!</p>
            </div>

            <!-- ✅ 수정: data-price, data-date 속성 추가 -->
            <div class="request-item" th:each="request : ${requestList}" 
                 th:data-category="${request.categoryName}"
                 th:data-price="${request.hopePrice}"
                 th:data-date="${request.createdAt}"
                 th:onclick="|location.href='/customer/request/detail/' + ${request.requestId}|">
                
                <img th:src="${request.thumbnailPath ?: '/image/no-image.png'}" class="item-thumbnail">
                
                <div class="item-info">
                    <div class="item-top-row">
                        <div class="item-category" th:text="${request.categoryName}">Category</div>
                        <span class="status-badge" 
                              th:classappend="${request.status == 'OPEN' ? 'status-open' : 'status-selected'}"
                              th:text="${request.status == 'OPEN' ? '의뢰중' : '낙찰완료'}">
                        </span>
                    </div>
                    
                    <div class="item-title" th:text="${request.title}">의뢰 제목</div>
                    <div class="item-meta">
                        <span th:text="${request.customerNickname}">작성자</span> • 
                        <span th:text="${request.createdAt}">날짜</span>
                    </div>
                </div>
                
                <div class="item-price">
                    ₩ <span th:text="${#numbers.formatInteger(request.hopePrice, 0, 'COMMA')}">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ 수정: 필터 + 정렬 통합 스크립트 -->
    <script>
    let currentCategory = 'all';

    function applyFilterAndSort() {
        const sortValue = document.getElementById('sortSelect').value;
        const list = document.querySelector('.request-list');
        const items = Array.from(document.querySelectorAll('.request-item'));

        // 카테고리 필터
        items.forEach(item => {
            const itemCategory = item.getAttribute('data-category');
            item.style.display = (currentCategory === 'all' || itemCategory === currentCategory) ? 'flex' : 'none';
        });

        // 보이는 항목 / 숨겨진 항목 분리
        const visibleItems = items.filter(item => item.style.display !== 'none');
        const hiddenItems  = items.filter(item => item.style.display === 'none');

        // 정렬
        visibleItems.sort((a, b) => {
            if (sortValue === 'price-high') {
                return parseInt(b.getAttribute('data-price')) - parseInt(a.getAttribute('data-price'));
            } else if (sortValue === 'price-low') {
                return parseInt(a.getAttribute('data-price')) - parseInt(b.getAttribute('data-price'));
            } else {
                // 최신순
                return (b.getAttribute('data-date') || '').localeCompare(a.getAttribute('data-date') || '');
            }
        });

        // DOM 재정렬
        [...visibleItems, ...hiddenItems].forEach(item => list.appendChild(item));
    }

    // 카테고리 필터 버튼
    document.querySelectorAll('.filter-btn').forEach(button => {
        button.addEventListener('click', function () {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.getAttribute('data-category');
            applyFilterAndSort();
        });
    });

    // 정렬 select
    document.getElementById('sortSelect').addEventListener('change', applyFilterAndSort);
    </script>
</th:block>
</body>
</html>
