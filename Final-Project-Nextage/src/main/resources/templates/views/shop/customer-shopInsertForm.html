<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
<meta charset="UTF-8">
<title>Nextage Kit Shop</title>
<link rel="stylesheet" th:href="@{/css/customerShop/customerShopForm.css}" />
</head>
<body>
<th:block layout:fragment="content">
    <div class="product-page-wrapper">
        <div class="glass-card">
            <div class="form-header-title">
                <h2>New Kit</h2>
                <p>상품 정보를 한 줄씩 차례대로 입력해주세요.</p>
            </div>

            <form th:action="@{/customer/shopForm}" method="post" enctype="multipart/form-data">
            	<input type="hidden" name="page" th:value="${page}">
                <div class="input-row">
                    <div class="input-col full">
                        <label class="label-style">상품명</label>
                        <input type="text" name="name" class="field-style" placeholder="상품 이름을 입력하세요" required>
                    </div>
                    
                    <div class="input-col">
                        <label class="label-style">제조사</label>
                        <input type="text" name="manufacturer" class="field-style" placeholder="브랜드명" required>
                    </div>
                    
                    <div class="input-col">
                        <label class="label-style">판매 가격</label>
                        <input type="number" name="price" class="field-style" placeholder="금액 입력" min="0" step="1" required>
                    </div>

                    <div class="input-col full">
                        <label class="label-style">초기 재고량</label>
                        <input type="number" name="stock" class="field-style" placeholder="0" min="0" step="1" required>
                    </div>
                </div>

                <hr style="border: 0; height: 1px; background: #eee; margin: 40px 0;">

                <div class="image-input-section">
                    <label class="label-style">메인 대표 이미지 (필수)</label>
                    <div class="upload-dropzone">
                        <i class="bi bi-image-fill"></i>
                        <p>목록에 표시될 메인 이미지를 선택하세요.</p>
                        <input type="file" name="mainImageFile1" class="file-input-style" required>
                    </div>
                </div>

                <div class="image-input-section">
                    <label class="label-style">메인 서브 이미지 (선택)</label>
                    <div class="upload-dropzone">
                        <i class="bi bi-images"></i>
                        <p>서브 이미지를 선택하세요.</p>
                        <input type="file" name="mainImageFile2" class="file-input-style" required>
                    </div>
                </div>

                <div class="image-input-section">
                    <label class="label-style">상세 설명 이미지 (필수)</label>
                    <div class="upload-dropzone">
                        <i class="bi bi-file-earmark-richtext"></i>
                        <p>상품 상세 설명이 담긴 세로형 이미지를 선택하세요.</p>
                        <input type="file" name="detailImageFile" class="file-input-style" required>
                    </div>
                </div>
				<div class="form-button-group">
				    <button type="submit" class="submit-button">상품 등록 완료하기</button>
				    <a th:href="@{/customer/shop(page =${page})}" class="cancel-button">취소</a>
				</div>
            </form>
        </div>
    </div>
    <script>
 // 모든 숫자형 input 요소를 대상으로 정규식 검사
    document.querySelectorAll('input[type="number"]').forEach(input => {
    let lastValue = input.value;

    input.addEventListener('input', function() {
        // 1. 진짜 다 지운 거면(빈 칸) 정상적인 지우기로 인정!
        if (this.value === '') {
            // 문자가 섞여서 지워진 건지 확인 (lastValue가 있었는데 갑자기 빈 칸이 된 경우)
            if (lastValue !== '') {
                // 문자를 쳐서 지워진 건지 체크하는 로직 (이건 상황 봐서 결정!)
                // 일단은 빈 칸 허용을 위해 백업만 비워둡니다.
                lastValue = '';
            }
            return;
        }

        // 2. 정상 숫자면 백업 갱신
        lastValue = this.value;
    });
});
    </script>
</th:block>
</body>
</html>
