spring.application.name=nextage

# [1] 파일 업로드 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# [2] Database 연결 정보 (비밀번호 포함됨)
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/nextage?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678

# [3] MyBatis 설정 (프로젝트 패키지명 com.nextage.web으로 수정함)
mybatis.type-aliases-package=com.nextage.web.domain
mybatis.mapper-locations=classpath:mappers/**/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

# [4] 타임리프(Thymeleaf) 설정 - 주석 다 풀었습니다! 이게 있어야 페이지가 열려요.
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.check-template-location=true

# [5] 외부 이미지 저장소 및 정적 리소스 설정 (D드라이브 로고를 위한 핵심 설정)
file.upload-dir=D:/nextageImage
spring.web.resources.static-locations=classpath:/static/,file:///D:/nextageImage/

# [6] 기타 서버 설정
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.devtools.livereload.enabled=true

# [7] HikariCP (커넥션 풀) 설정
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=NeedloHikariCP