spring.application.name=nextage

# 파일 업로드 제한
# 파일 최대 한 개당 크기 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# Database 연결 정보
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/miniproject?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678

# MyBatis 설정
mybatis.type-aliases-package=com.springbootsmini.app.domain
mybatis.mapper-locations=classpath:mappers/**/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 한글 처리
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# 업로드 파일 외부 저장 위치
file.upload-dir=D:/nextageImage

# 개발용 자동 재시작 / 라이브리로드
spring.devtools.remote.restart.enabled=false
spring.devtools.livereload.enabled=true

# Thymeleaf 설정 - prefix와 suffix는 기본으로 설정
# spring.thymeleaf.prefix=classpath:/templates/
# spring.thymeleaf.suffix=.html
# spring.thymeleaf.view-names=views/*
# Thymeleaf에서 캐시를 사용하지 않도록 설정
spring.thymeleaf.cache=false

# Thymeleaf 사용 해설
# spring.thymeleaf.enabled=true
# 개발 환경에서 화면 새로고침 반영을 위해 설정
# spring.thymeleaf.check-template=false
# template 위치 변경 시 반영 확인 설정
# spring.thymeleaf.check-template-location=true

# 동으로 DB 연결을 미리 만들어 놓고 재사용해서 체감 속도가 빨라짐
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=NeedloHikariCP