spring.application.name=nextage

# [1] 铆聦聦矛聺录 矛聴聟毛隆聹毛聯聹 矛聞陇矛聽聲
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# [2] Database 矛聴掳锚虏掳 矛聽聲毛鲁麓 (毛鹿聞毛掳聙毛虏聢铆聵赂 铆聫卢铆聲篓毛聬篓)
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/nextage?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678

# [3] MyBatis 矛聞陇矛聽聲 (铆聰聞毛隆聹矛聽聺铆聤赂 铆聦篓铆聜陇矛搂聙毛陋聟 com.nextage.web矛聹录毛隆聹 矛聢聵矛聽聲铆聲篓)
mybatis.type-aliases-package=com.nextage.web.domain
mybatis.mapper-locations=classpath:mappers/**/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

# [4] 铆聝聙矛聻聞毛娄卢铆聰聞(Thymeleaf) 矛聞陇矛聽聲 - 矛拢录矛聞聺 毛聥陇 铆聮聙矛聴聢矛聤碌毛聥聢毛聥陇! 矛聺麓锚虏聦 矛聻聢矛聳麓矛聲录 铆聨聵矛聺麓矛搂聙锚掳聙 矛聴麓毛聽陇矛職聰.
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.check-template-location=true

# [5] 矛聶赂毛露聙 矛聺麓毛炉赂矛搂聙 矛聽聙矛聻楼矛聠聦 毛掳聫 矛聽聲矛聽聛 毛娄卢矛聠聦矛聤陇 矛聞陇矛聽聲 (D毛聯聹毛聺录矛聺麓毛赂聦 毛隆聹锚鲁聽毛楼录 矛聹聞铆聲聹 铆聲碌矛聥卢 矛聞陇矛聽聲)
file.upload-dir=D:/nextageImage
spring.web.resources.static-locations=classpath:/static/,file:///D:/nextageImage/

# [6] 锚赂掳铆聝聙 矛聞聹毛虏聞 矛聞陇矛聽聲
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.devtools.livereload.enabled=true

# [7] HikariCP (矛禄陇毛聞楼矛聟聵 铆聮聙) 矛聞陇矛聽聲
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=NeedloHikariCP