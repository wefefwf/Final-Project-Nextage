<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nextage</title>
    <link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet" >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link th:href="@{/css/businessMain/businessHeader.css}" rel="stylesheet" />
    <link th:href="@{/css/businessMain/businessFooter.css}" rel="stylesheet" />
    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <style>
        #globalChatBtn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, #1c1c1e, #3a3a3c); border-radius: 50%; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.1); }
        #globalChatBtn:hover { transform: translateY(-5px); background: linear-gradient(135deg, #000, #2c2c2e); }
        #globalChatBadge { position: absolute; top: -2px; right: -2px; background-color: #ff3b30; color: #fff; font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 10px; display: none; align-items: center; justify-content: center; padding: 0 5px; border: 2px solid #fff; }
        #globalChatBtn svg { width: 28px; height: 28px; fill: #fff; }
        #miniChatDrawer { position: fixed; bottom: 100px; right: 30px; width: 360px; height: 550px; background: #fff; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; z-index: 9998; border: 1px solid #d1d1d6; }
        .mini-header { padding: 18px 20px; border-bottom: 1px solid #efeff4; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .mini-header h6 { margin: 0; font-weight: 800; font-size: 14px; color: #1c1c1e; letter-spacing: -0.5px; }
        .mini-body { flex: 1; overflow-y: auto; background: #f4f4f7; position: relative; }
        .mini-room-item { padding: 15px 20px; border-bottom: 1px solid #efeff4; cursor: pointer; background: #fff; }
        .mini-room-item:hover { background: #f8f8fa; }
        .mini-chat-content { display: none; flex-direction: column; height: 100%; position: absolute; top: 0; left: 0; width: 100%; background: #f4f4f7; z-index: 10; }
        .mini-msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; }
        .mini-footer { padding: 10px 15px; border-top: 1px solid #efeff4; background: #fff; }
        .mini-input-wrap { background: #fff; border: 1px solid #d1d1d6; border-radius: 8px; display: flex; align-items: center; padding: 2px 10px; }
        .mini-input-wrap input { flex: 1; border: none; padding: 8px; font-size: 13px; }
        .mini-input-wrap input:focus { outline: none; }
        .mini-photo-btn { cursor: pointer; color: #1c1c1e; font-size: 20px; margin-right: 8px; }
        .mini-send-btn { color: #1c1c1e; font-weight: 800; cursor: pointer; font-size: 12px; }
        .mini-msg-row { display: flex; align-items: flex-end; width: 100%; margin-bottom: 4px; }
        .mini-msg-row.right { flex-direction: row-reverse; }
        .mini-msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 13px; }
        .mini-msg-right { background: #1c1c1e; color: #fff; border-bottom-right-radius: 2px; }
        .mini-msg-left { background: #fff; color: #1c1c1e; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .mini-msg-time { font-size: 9px; color: #8e8e93; margin: 0 5px; }
        .mini-back-btn { cursor: pointer; font-size: 18px; color: #1c1c1e; margin-right: 10px; }
        .msg-image-only { background: transparent !important; padding: 0 !important; box-shadow: none !important; }
        #miniPreviewContainer { display: none !important; padding: 10px; border-top: 1px solid #efeff4; background: #f8f8fa; position: relative; }
        #miniPreviewImg { max-width: 70px; max-height: 70px; border-radius: 4px; border: 1px solid #d1d1d6; }
        #miniClearImgBtn { position: absolute; top: 5px; left: 75px; background: #3a3a3c; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container-fluid px-5">
        <div th:replace="~{fragments/business-header::header}"></div>	
        <main class="mt-4"><div layout:fragment="content"></div></main>
        <div th:replace="~{fragments/business-footer::footer}"></div>	
    </div>

    <div th:if="${#authorization.expression('isAuthenticated()')}">
        <div id="miniChatDrawer">
            <div class="mini-header">
                <div class="d-flex align-items-center">
                    <span class="mini-back-btn" id="miniBackBtn" style="display:none;">&larr;</span>
                    <h6 id="miniHeaderTitle">BUSINESS MESSAGES</h6>
                </div>
                <span style="cursor:pointer; color:#8e8e93; font-size:14px;" onclick="toggleMiniChat()">✕</span>
            </div>
            <div class="mini-body" id="miniBody">
                <div id="miniRoomList"></div>
                <div class="mini-chat-content" id="miniChatView">
                    <div class="mini-msg-area" id="miniMsgArea"></div>
                    <div id="miniPreviewContainer"><img id="miniPreviewImg" src=""><button id="miniClearImgBtn" onclick="clearMiniPreview()">✕</button></div>
                    <div class="mini-footer">
                        <div class="mini-input-wrap">
                            <input type="file" id="miniFileInput" style="display:none;" accept="image/*" onchange="previewMiniFile()">
                            <span class="mini-photo-btn" onclick="document.getElementById('miniFileInput').click()">+</span>
                            <input type="text" id="miniInput" placeholder="답변 입력...">
                            <span class="mini-send-btn" onclick="sendMiniMsg()">전송</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="globalChatBtn" onclick="toggleMiniChat()">
            <span id="globalChatBadge">0</span>
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.145 2 11.25c0 2.457 1.082 4.67 2.85 6.27-.12.633-.6 2.053-1.35 2.93-.11.13-.15.31-.09.47.06.16.21.28.39.28 2.34 0 4.08-.94 4.89-1.54.98.24 2.02.36 3.09.36 5.523 0 10-4.145 10-9.25S17.523 2 12 2zm0 16.5c-.93 0-1.83-.11-2.69-.32-.19-.05-.39 0-.54.12-.55.4-1.6.99-3.15 1.25.4-.65.75-1.5 1-2.33.06-.2-.01-.4-.17-.54-1.57-1.31-2.52-3.13-2.52-5.18 0-4.14 3.96-7.5 8.83-7.5s8.83 3.36 8.83 7.5-3.96 7.5-8.83 7.5z"/></svg>
        </div>
    </div>

    <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        let miniStomp = null;
        let userData = null;
        let currentMiniRoomId = null;
        let currentMiniSub = null;
        let selectedMiniFile = null;

        function formatDisplayDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const targetDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const diffDays = Math.floor((today - targetDate) / (24 * 60 * 60 * 1000));
            if (diffDays === 0) return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            if (diffDays === 1) return '어제';
            return d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0') + '-' + d.getDate().toString().padStart(2, '0');
        }

        function toggleMiniChat() {
            const drawer = document.getElementById('miniChatDrawer');
            if(!drawer) return;
            const isVisible = drawer.style.display === 'flex';
            drawer.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) loadMiniRooms();
        }

        function loadMiniRooms() {
            if(currentMiniSub) { currentMiniSub.unsubscribe(); currentMiniSub = null; }
            currentMiniRoomId = null;
            clearMiniPreview();
            const backBtn = document.getElementById('miniBackBtn');
            if(backBtn) backBtn.style.display = 'none';
            const chatView = document.getElementById('miniChatView');
            if(chatView) chatView.style.display = 'none';
            document.getElementById('miniHeaderTitle').innerText = 'BUSINESS MESSAGES';
            fetch('/chat/mini/rooms').then(res => res.json()).then(rooms => {
                const list = document.getElementById('miniRoomList');
                if(!list) return;
                list.innerHTML = '';
                if(!rooms || rooms.length === 0) { list.innerHTML = '<div style="padding:50px; text-align:center; color:#8e8e93; font-size:13px;">메시지가 없습니다.</div>'; return; }
                rooms.forEach(r => {
                    const item = document.createElement('div');
                    item.className = 'mini-room-item';
                    const badgeHtml = r.unreadCount > 0 ? `<span class="badge bg-danger rounded-pill" id="mini-unread-${r.roomId}">${r.unreadCount}</span>` : '';
                    const displayMsg = (r.lastMessage && r.lastMessage.startsWith('/images/')) ? '(사진)' : (r.lastMessage || '대화 없음');
                    item.innerHTML = `<div class="d-flex justify-content-between"><span style="font-weight:700; font-size:13px; color:#1c1c1e;">${r.partnerName}</span>${badgeHtml}</div><div class="d-flex justify-content-between mt-1"><div style="font-size:12px; color:#8e8e93;" class="text-truncate">${displayMsg}</div><small style="font-size:10px; color:#aeaeae;">${formatDisplayDate(r.lastMessageTime)}</small></div>`;
                    item.onclick = () => openMiniChat(r.roomId, r.partnerName);
                    list.appendChild(item);
                });
            });
        }

        function markAsRead(roomId) {
            if(!roomId || !userData) return;
            fetch(`/chat/read/${roomId}?userType=${userData.userType}`, { method: 'POST' }).then(() => {
                const badge = document.getElementById('mini-unread-' + roomId);
                if(badge) { badge.innerText = '0'; badge.style.display = 'none'; }
                updateGlobalBadge();
            });
        }

        function updateGlobalBadge() {
            const badge = document.getElementById('globalChatBadge');
            if(!badge) return;
            fetch('/chat/global-info').then(res => res.json()).then(data => {
                badge.innerText = data.unreadCount;
                badge.style.display = data.unreadCount > 0 ? 'flex' : 'none';
            });
        }

        function openMiniChat(roomId, name) {
            if(currentMiniSub) { currentMiniSub.unsubscribe(); }
            currentMiniRoomId = roomId;
            const backBtn = document.getElementById('miniBackBtn');
            if(backBtn) backBtn.style.display = 'block';
            document.getElementById('miniChatView').style.display = 'flex';
            document.getElementById('miniHeaderTitle').innerText = name;
            markAsRead(roomId);
            currentMiniSub = miniStomp.subscribe('/sub/chat/room/' + roomId, function(msg) {
                const received = JSON.parse(msg.body);
                appendMiniMsg(received);
                if(received.senderType !== userData.userType) markAsRead(roomId);
            });
            fetch('/chat/mini/messages?roomId=' + roomId).then(res => res.json()).then(msgs => {
                const area = document.getElementById('miniMsgArea');
                if(!area) return;
                area.innerHTML = '';
                if(msgs) msgs.forEach(m => appendMiniMsg(m));
                area.scrollTop = area.scrollHeight;
            });
        }

        function appendMiniMsg(m) {
            const area = document.getElementById('miniMsgArea');
            if(!area || !userData) return;
            const dateObj = m.sendAt ? new Date(m.sendAt) : new Date();
            const isMy = m.senderId === userData.myId && m.senderType === userData.userType;
            const row = document.createElement('div');
            row.className = `mini-msg-row ${isMy ? 'right' : 'left'}`;
            let contentHtml = `<div class="mini-msg-bubble ${isMy ? 'mini-msg-right' : 'mini-msg-left'} ${m.messageType === 'IMAGE' ? 'msg-image-only' : ''}">`;
            if(m.messageType === 'IMAGE') { contentHtml += `<img src="${m.content}" style="max-width:100%; border-radius:8px;">`; }
            else { contentHtml += `<span>${m.content}</span>`; }
            row.innerHTML = contentHtml + `</div><span class="mini-msg-time">${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}</span>`;
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;
        }

        function sendMiniMsg() {
            const input = document.getElementById('miniInput');
            if(!miniStomp || !userData || (!input.value.trim() && !selectedMiniFile)) return;
            if (selectedMiniFile) {
                const formData = new FormData();
                formData.append("file", selectedMiniFile);
                fetch('/chat/upload', { method: 'POST', body: formData }).then(res => res.text()).then(url => {
                    miniStomp.send("/pub/chat/send", {}, JSON.stringify({ roomId: currentMiniRoomId, senderId: userData.myId, senderType: userData.userType, content: url, messageType: 'IMAGE' }));
                    clearMiniPreview();
                    if (input.value.trim()) { sendMiniText(input.value.trim()); input.value = ''; }
                });
            } else {
                sendMiniText(input.value.trim());
                input.value = '';
            }
        }

        function sendMiniText(txt) {
            miniStomp.send("/pub/chat/send", {}, JSON.stringify({ roomId: currentMiniRoomId, senderId: userData.myId, senderType: userData.userType, content: txt, messageType: 'TEXT' }));
        }

        function previewMiniFile() {
            selectedMiniFile = document.getElementById('miniFileInput').files[0];
            if (selectedMiniFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('miniPreviewImg').src = e.target.result;
                    document.getElementById('miniPreviewContainer').setAttribute('style', 'display: block !important');
                };
                reader.readAsDataURL(selectedMiniFile);
            }
        }

        function clearMiniPreview() {
            selectedMiniFile = null;
            const fileInput = document.getElementById('miniFileInput');
            if(fileInput) fileInput.value = '';
            const img = document.getElementById('miniPreviewImg');
            if(img) img.src = '';
            const container = document.getElementById('miniPreviewContainer');
            if(container) container.setAttribute('style', 'display: none !important');
        }

        (function init() {
            const chatBtn = document.getElementById('globalChatBtn');
            if (!chatBtn || window.location.pathname.includes('/chat')) { if(chatBtn) chatBtn.style.display = 'none'; return; }
            const backBtn = document.getElementById('miniBackBtn');
            if(backBtn) backBtn.onclick = loadMiniRooms;
            const miniInput = document.getElementById('miniInput');
            if(miniInput) miniInput.onkeypress = (e) => { if(e.key === 'Enter') sendMiniMsg(); };
            fetch('/chat/global-info').then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            }).then(data => {
                userData = data;
                updateGlobalBadge();
                const socket = new SockJS('/ws-chat');
                miniStomp = Stomp.over(socket);
                miniStomp.debug = null;
                miniStomp.connect({}, function() {
                    miniStomp.subscribe('/sub/chat/user/' + data.userType + '/' + data.myId, function(msg) {
                        const m = JSON.parse(msg.body);
                        updateGlobalBadge();
                        if (document.getElementById('miniChatDrawer').style.display === 'flex' && !currentMiniRoomId) loadMiniRooms();
                    });
                });
            }).catch(() => { if(chatBtn) chatBtn.style.display = 'none'; });
        })();
    </script>
    <th:block layout:fragment="script"></th:block>
</body>
</html>
