<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">
<head>
    <meta charset="UTF-8">
    <title>내 제안 리스트 - Nextage</title>
    <style>
        /* ── 페이지 기본 ── */
        .mypage-bids-wrap {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        /* ── 공지 박스 ── */
        .notice-box {
            background: #f8f8f8;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 36px;
        }
        .notice-box-title {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .notice-box-text {
            font-size: 13px;
            color: #555;
            line-height: 1.7;
            margin: 0;
        }

        /* ── 섹션 헤더 ── */
        .bids-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .bids-section-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
        }
        .bids-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            background: #111;
            color: #fff;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            padding: 0 7px;
            margin-left: 8px;
        }

        /* ── 제안 카드 ── */
        .bid-card {
            display: flex;
            align-items: stretch;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
            transition: box-shadow 0.18s, border-color 0.18s;
        }
        .bid-card:hover {
            box-shadow: 0 4px 18px rgba(0,0,0,0.07);
            border-color: #d0d0d0;
        }

        /* 상태 컬러 바 (왼쪽) */
        .bid-card-bar {
            width: 5px;
            flex-shrink: 0;
            background: #ddd;
        }
        .bid-card-bar.bar-active    { background: #111; }
        .bid-card-bar.bar-selected  { background: #22c55e; }
        .bid-card-bar.bar-rejected  { background: #ef4444; }
        .bid-card-bar.bar-withdrawn { background: #94a3b8; }

        /* 카드 내용 */
        .bid-card-body {
            flex: 1;
            padding: 18px 20px 16px;
            min-width: 0;
        }
        .bid-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .bid-card-request-title {
            font-size: 15px;
            font-weight: 600;
            color: #111;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 420px;
        }
        .bid-card-request-title a {
            color: inherit;
            text-decoration: none;
        }
        .bid-card-request-title a:hover {
            text-decoration: underline;
        }

        .bid-status-badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 99px;
            white-space: nowrap;
        }
        .badge-active    { background: #f3f4f6; color: #374151; }
        .badge-selected  { background: #dcfce7; color: #15803d; }
        .badge-rejected  { background: #fee2e2; color: #b91c1c; }
        .badge-withdrawn { background: #f1f5f9; color: #64748b; }

        .bid-card-desc {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .bid-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 12px;
            color: #888;
        }
        .bid-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .bid-meta-label { color: #aaa; }
        .bid-meta-value { color: #444; font-weight: 500; }
        .bid-meta-price { color: #111; font-weight: 700; font-size: 13px; }

        /* ── 액션 영역 ── */
        .bid-card-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 18px;
            border-left: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        .btn-view-request {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 14px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-view-request:hover { background: #333; color: #fff; }

        .btn-delete-bid {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 14px;
            background: transparent;
            color: #999;
            border: 1px solid #e0e0e0;
            border-radius: 9px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-delete-bid:hover { border-color: #ef4444; color: #ef4444; }
        .btn-delete-bid.hidden-btn { visibility: hidden; pointer-events: none; }

        /* ── 삭제 확인 인라인 UI ── */
        .delete-confirm-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .delete-confirm-msg { font-size: 12px; color: #555; white-space: nowrap; }
        .delete-confirm-btns { display: flex; gap: 6px; }
        .btn-del-cancel {
            padding: 5px 11px;
            border: 1px solid #ddd;
            border-radius: 7px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-del-ok {
            padding: 5px 11px;
            border: none;
            border-radius: 7px;
            background: #ef4444;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── 빈 상태 ── */
        .bids-empty {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        .bids-empty-icon { font-size: 40px; margin-bottom: 12px; }
        .bids-empty-text { font-size: 15px; color: #bbb; }

        /* ── 페이지네이션 ── */
        .bids-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
        }
        .page-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #e0e0e0;
            border-radius: 9px;
            background: #fff;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            transition: background 0.13s, border-color 0.13s, color 0.13s;
        }
        .page-btn:hover { border-color: #111; color: #111; }
        .page-btn.active { background: #111; border-color: #111; color: #fff; font-weight: 700; }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── 토스트 ── */
        #bids-toast-root {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .bids-toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.13);
            pointer-events: auto;
            animation: toastIn 0.25s ease;
        }
        .bids-toast.toast-success { background: #111; color: #fff; }
        .bids-toast.toast-error   { background: #ef4444; color: #fff; }
        @keyframes toastIn  { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .bids-toast-hiding  { animation: toastOut 0.25s ease forwards; }
        @keyframes toastOut { to { opacity:0; transform:translateY(-10px); } }

        /* ── 반응형 ── */
        @media (max-width: 600px) {
            .bid-card-top { flex-direction: column; gap: 6px; }
            .bid-card-request-title { max-width: 100%; white-space: normal; }
            .bid-card-actions {
                flex-direction: row;
                border-left: none;
                border-top: 1px solid #f0f0f0;
                padding: 12px 16px;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

<th:block layout:fragment="content">

    <div id="bids-toast-root"></div>

    <div class="mypage-bids-wrap">

        <!-- 공지 -->
        <div class="notice-box">
            <div class="notice-box-title">Notice</div>
            <p class="notice-box-text">
                · 제안 삭제 시 해당 의뢰글에 다시 제안할 수 있습니다.<br/>
                · 채택 완료된 제안은 삭제할 수 없습니다.
            </p>
        </div>

        <!-- 섹션 헤더 -->
        <div class="bids-section-header">
            <h2 class="bids-section-title">
                내 제안 리스트
                <span class="bids-count-badge" id="bids-total-count">0</span>
            </h2>
        </div>

        <!-- 제안 목록 (JS로 렌더링) -->
        <div id="bids-list-container"></div>

        <!-- 빈 상태 -->
        <div id="bids-empty" class="bids-empty" style="display:none;">
            <div class="bids-empty-icon">✉️</div>
            <p class="bids-empty-text">아직 보낸 제안이 없습니다.</p>
        </div>

        <!-- 페이지네이션 -->
        <div class="bids-pagination" id="bids-pagination"></div>

    </div>

    <!-- 인증 정보 주입 -->
    <input type="hidden" id="auth-business-id"
           sec:authorize="hasRole('BUSER')"
           th:value="${#authentication.principal.businessId}" />

    <script>
    (function () {
        const PAGE_SIZE = 5;

        let allBids     = [];
        let currentPage = 1;

        const businessIdEl = document.getElementById('auth-business-id');
        const BUSINESS_ID  = businessIdEl ? Number(businessIdEl.value) : 0;

        document.addEventListener('DOMContentLoaded', loadMyBids);

        function loadMyBids() {
            if (!BUSINESS_ID) { showEmpty(); return; }

            fetch('/api/bids/business/' + BUSINESS_ID)
                .then(function(res) {
                    if (!res.ok) throw new Error('목록 조회 실패');
                    return res.json();
                })
                .then(function(data) {
                    allBids = data || [];
                    currentPage = 1;
                    render();
                })
                .catch(function(err) {
                    showToast('error', err.message);
                    showEmpty();
                });
        }

        /* ── 렌더링 ── */
        function render() {
            var container  = document.getElementById('bids-list-container');
            var emptyEl    = document.getElementById('bids-empty');
            var countEl    = document.getElementById('bids-total-count');
            var pagination = document.getElementById('bids-pagination');

            container.innerHTML  = '';
            pagination.innerHTML = '';
            countEl.textContent  = allBids.length;

            if (allBids.length === 0) { showEmpty(); return; }
            emptyEl.style.display = 'none';

            var totalPages = Math.ceil(allBids.length / PAGE_SIZE);
            var start      = (currentPage - 1) * PAGE_SIZE;
            var pageBids   = allBids.slice(start, start + PAGE_SIZE);

            pageBids.forEach(function(bid) {
                container.insertAdjacentHTML('beforeend', buildCard(bid));
            });

            buildPagination(totalPages);
        }

        function buildCard(bid) {
        	var si = getStatusInfo(bid);
        	var canDelete = bid.status !== 'SELECTED' 
        	    && !(bid.status === 'ACTIVE' && bid.requestStatus === 'COMPLETE');

            var deleteBtnHtml = canDelete
                ? '<button class="btn-delete-bid" onclick="askDelete(' + bid.bidId + ', this)">삭제</button>'
                : '<button class="btn-delete-bid hidden-btn" disabled>삭제</button>';

            return '<div class="bid-card" id="bid-card-' + bid.bidId + '">'
                + '<div class="bid-card-bar ' + si.barClass + '"></div>'
                + '<div class="bid-card-body">'
                +   '<div class="bid-card-top">'
                +     '<div class="bid-card-request-title">'
                +       '<a href="/customer/request/' + bid.requestId + '">'
                +         escHtml(bid.requestTitle || '의뢰글 #' + bid.requestId)
                +       '</a>'
                +     '</div>'
                +     '<span class="bid-status-badge ' + si.badgeClass + '">' + si.icon + ' ' + si.label + '</span>'
                +   '</div>'
                +   '<p class="bid-card-desc">' + escHtml(bid.description || '') + '</p>'
                +   '<div class="bid-card-meta">'
                +     '<div class="bid-meta-item"><span class="bid-meta-label">제안가</span><span class="bid-meta-value bid-meta-price">₩ ' + formatPrice(bid.price) + '</span></div>'
                +     '<div class="bid-meta-item"><span class="bid-meta-label">예상완료</span><span class="bid-meta-value">' + (bid.expectedDueDate || '-') + '</span></div>'
                +     '<div class="bid-meta-item"><span class="bid-meta-label">A/S</span><span class="bid-meta-value">' + (bid.asAvailable ? '가능' : '불가') + '</span></div>'
                +     '<div class="bid-meta-item"><span class="bid-meta-label">제안일</span><span class="bid-meta-value">' + formatDate(bid.createdAt) + '</span></div>'
                +   '</div>'
                + '</div>'
                + '<div class="bid-card-actions" id="bid-actions-' + bid.bidId + '">'
                +   '<a class="btn-view-request" href="/business/request/detail/' + bid.requestId + '">제안 글 보러가기 →</a>'
                +   deleteBtnHtml
                + '</div>'
                + '</div>';
        }

        function buildPagination(totalPages) {
            if (totalPages <= 1) return;
            var pagination = document.getElementById('bids-pagination');

            var prevBtn = document.createElement('button');
            prevBtn.className   = 'page-btn';
            prevBtn.textContent = '←';
            prevBtn.disabled    = currentPage === 1;
            prevBtn.onclick     = function() { currentPage--; render(); };
            pagination.appendChild(prevBtn);

            for (var i = 1; i <= totalPages; i++) {
                (function(i) {
                    var btn = document.createElement('button');
                    btn.className   = 'page-btn' + (i === currentPage ? ' active' : '');
                    btn.textContent = i;
                    btn.onclick     = function() { currentPage = i; render(); };
                    pagination.appendChild(btn);
                })(i);
            }

            var nextBtn = document.createElement('button');
            nextBtn.className   = 'page-btn';
            nextBtn.textContent = '→';
            nextBtn.disabled    = currentPage === totalPages;
            nextBtn.onclick     = function() { currentPage++; render(); };
            pagination.appendChild(nextBtn);
        }

        /* ── 삭제 확인 UI ── */
        window.askDelete = function(bidId, triggerBtn) {
            var actionsEl = document.getElementById('bid-actions-' + bidId);
            if (!actionsEl || actionsEl.querySelector('.delete-confirm-zone')) return;

            actionsEl.querySelectorAll('button, a').forEach(function(el) { el.style.display = 'none'; });

            var zone = document.createElement('div');
            zone.className = 'delete-confirm-zone';
            zone.innerHTML =
                '<span class="delete-confirm-msg">정말 삭제할까요?</span>'
                + '<div class="delete-confirm-btns">'
                +   '<button class="btn-del-cancel" onclick="cancelDelete(' + bidId + ')">취소</button>'
                +   '<button class="btn-del-ok"     onclick="confirmDelete(' + bidId + ')">삭제</button>'
                + '</div>';
            actionsEl.appendChild(zone);
        };

        window.cancelDelete = function(bidId) {
            var actionsEl = document.getElementById('bid-actions-' + bidId);
            if (!actionsEl) return;
            var zone = actionsEl.querySelector('.delete-confirm-zone');
            if (zone) zone.remove();
            actionsEl.querySelectorAll('button, a').forEach(function(el) { el.style.display = ''; });
        };

        window.confirmDelete = function(bidId) {
            fetch('/api/bids/' + bidId, { method: 'DELETE' })
                .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
                .then(function(result) {
                    if (!result.ok || result.data.success === false) throw new Error(result.data.message || '삭제 실패');
                    allBids = allBids.filter(function(b) { return b.bidId !== bidId; });
                    var totalPages = Math.ceil(allBids.length / PAGE_SIZE);
                    if (currentPage > totalPages && currentPage > 1) currentPage--;
                    render();
                    showToast('success', '제안이 삭제되었습니다.');
                })
                .catch(function(err) { showToast('error', err.message); });
        };

        /* ── 유틸 ── */
        function showEmpty() {
            document.getElementById('bids-empty').style.display = '';
            document.getElementById('bids-total-count').textContent = '0';
        }

        function getStatusInfo(bid) {
        	if (bid.status === 'ACTIVE' && bid.requestStatus === 'COMPLETE') {
                return { barClass:'bar-rejected', badgeClass:'badge-rejected', icon:'✖', label:'미채택' };
            }
            switch (bid.status) {
                case 'ACTIVE':    return { barClass:'bar-active',    badgeClass:'badge-active',    icon:'●', label:'진행중'   };
                case 'SELECTED':  return { barClass:'bar-selected',  badgeClass:'badge-selected',  icon:'✔', label:'채택완료' };
                case 'REJECTED':  return { barClass:'bar-rejected',  badgeClass:'badge-rejected',  icon:'✖', label:'거절'     };
                case 'WITHDRAWN': return { barClass:'bar-withdrawn', badgeClass:'badge-withdrawn', icon:'–', label:'철회'     };
                default:          return { barClass:'',              badgeClass:'badge-active',    icon:'·', label: status || '-' };
            }
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ko-KR').format(price || 0);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('ko-KR');
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showToast(type, msg) {
            var root = document.getElementById('bids-toast-root');
            var el   = document.createElement('div');
            el.className   = 'bids-toast ' + (type === 'success' ? 'toast-success' : 'toast-error');
            el.textContent = msg;
            root.appendChild(el);
            setTimeout(function() {
                el.classList.add('bids-toast-hiding');
                el.addEventListener('animationend', function() { el.remove(); }, { once: true });
            }, 3000);
        }

    })();
    </script>

</th:block>

</body>
</html>
