<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>기업 로그인 (임시)</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>🏢 기업(Business) 로그인 테스트</h2>
    <div th:if="${param.error}"><p style="color:red;">아이디 또는 비밀번호가 틀렸습니다.</p></div>
    <div th:if="${param.logout}"><p style="color:blue;">로그아웃 되었습니다.</p></div>
    <!-- SecurityConfig의 loginProcessingUrl("/auth/business/loginProc") 과 일치 -->
    <form action="/auth/business/loginProc" method="post">
        <div>
            <label>기업 아이디: </label>
            <input type="text" name="loginId" placeholder="기업 아이디" required>
        </div>
        <div>
            <label>비밀번호: </label>
            <input type="password" name="password" placeholder="비밀번호" required>
        </div>
        <br>
        <button type="submit">기업 로그인</button>
    </form>
</body>
</html>
