<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">

<div layout:fragment="content">
    <style>
        .chat-page-container { max-width: 1200px; margin: 40px auto; display: flex; height: 750px; border: 1px solid #333; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .chat-sidebar { width: 320px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #f8f9fa; }
        .sidebar-header { padding: 25px; font-weight: 800; font-size: 1.2rem; border-bottom: 2px solid #333; color: #222; background: #fff; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #f1f1f1; }
        .chat-item.active { background: #333 !important; color: #fff !important; border-left: 6px solid #ffc107; }
        .chat-item.active .text-muted { color: #ccc !important; }
        .chat-item.active small { color: #ffc107 !important; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; background: #f4f4f4; }
        .msg-bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 14px; line-height: 1.5; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg-right { align-self: flex-end; background: #333; color: #fff; border-bottom-right-radius: 2px; }
        .msg-left { align-self: flex-start; background: #fff; border: 1px solid #ddd; color: #333; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: #999; margin-top: 5px; display: block; }
        .msg-right .msg-time { color: #bbb; text-align: right; }
        .chat-footer { padding: 20px; background: #fff; border-top: 1px solid #eee; }
        .btn-dark-custom { background: #222; color: #fff; border: none; padding: 10px 25px; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn-dark-custom:hover { background: #000; transform: translateY(-1px); }
        .form-control:focus { border-color: #333; box-shadow: none; }
    </style>

    <div class="chat-page-container">
        <div class="chat-sidebar">
            <div class="sidebar-header">BUSINESS CENTER</div>
            <div class="chat-list" id="chatListContainer">
                <div th:each="room : ${myRooms}" 
                     class="chat-item" 
                     th:id="'room-item-' + ${room.roomId}"
                     th:classappend="${currentRoomId != null && room.roomId == currentRoomId ? 'active' : ''}"
                     th:onclick="|location.href='/chat?roomId=' + ${room.roomId}|">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold" th:text="${room.partnerName}"></span>
                        <div>
                            <span th:if="${room.unreadCount != null and room.unreadCount > 0}" 
                                  class="badge bg-danger rounded-pill me-1" 
                                  th:id="'unread-count-' + ${room.roomId}" 
                                  th:text="${room.unreadCount}"></span>
                            <span th:unless="${room.unreadCount != null and room.unreadCount > 0}" 
                                  class="badge bg-danger rounded-pill me-1" 
                                  th:id="'unread-count-' + ${room.roomId}" 
                                  style="display: none;">0</span>
                            <small th:id="'room-time-' + ${room.roomId}" th:text="${room.lastMessageTime}"></small>
                        </div>
                    </div>
                    <div class="text-muted small text-truncate mt-1" th:id="'room-msg-' + ${room.roomId}" th:text="${room.lastMessage}"></div>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-body" id="chatBody">
                <div th:each="msg : ${messages}" 
                     class="msg-bubble shadow-sm" 
                     th:classappend="${msg.senderType == 'BUSINESS' ? 'msg-right' : 'msg-left'}">
                    <span th:text="${msg.content}"></span>
                    <span class="msg-time" th:text="${msg.sendAt}"></span>
                </div>
                <div th:if="${currentRoomId == null}" class="m-auto text-center">
                    <p class="text-muted">응대할 고객을 선택해 주세요.</p>
                </div>
            </div>

            <div class="chat-footer" th:if="${currentRoomId != null}">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="고객에게 답변 메시지 보내기...">
                    <button class="btn btn-dark-custom" onclick="sendMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        const chatBody = document.getElementById('chatBody');
        if(chatBody) chatBody.scrollTop = chatBody.scrollHeight;

        let stompClient = null;
        const currentRoomId = /*[[${currentRoomId}]]*/ null; 
        const myId = /*[[${myId}]]*/ null; 
        const userType = /*[[${userType}]]*/ '';

        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                
                stompClient.subscribe('/sub/chat/user/' + userType + '/' + myId, function (message) {
                    const receivedMessage = JSON.parse(message.body);
                    const now = new Date();
                    const timeString = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                    
                    updateSidebar(receivedMessage.roomId, receivedMessage.content, timeString, false);
                });

                if (currentRoomId) {
                    stompClient.subscribe('/sub/chat/room/' + currentRoomId, function (message) {
                        const receivedMessage = JSON.parse(message.body);
                        appendMessageToScreen(receivedMessage);
                    });
                }
            });
        }

        function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            if(!inputElement) return;
            const content = inputElement.value;
            if(content && stompClient) {
                const chatMessageDTO = {
                    roomId: currentRoomId,
                    senderId: myId,
                    senderType: 'BUSINESS',
                    content: content
                };
                stompClient.send("/pub/chat/send", {}, JSON.stringify(chatMessageDTO));
                inputElement.value = ''; 
            }
        }

        function appendMessageToScreen(message) {
            const box = document.getElementById('chatBody');
            if(!box) return;
            const wrapper = document.createElement('div');
            wrapper.classList.add('msg-bubble', 'shadow-sm');
            
            const isMyMessage = (message.senderId === myId && message.senderType === 'BUSINESS');
            
            if(isMyMessage) {
                wrapper.classList.add('msg-right');
            } else {
                wrapper.classList.add('msg-left');
            }
            
            const contentSpan = document.createElement('span');
            contentSpan.innerText = message.content;
            const timeSpan = document.createElement('span');
            timeSpan.classList.add('msg-time');
            const now = new Date();
            const timeString = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            timeSpan.innerText = timeString;
            
            wrapper.appendChild(contentSpan);
            wrapper.appendChild(timeSpan);
            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
            
            updateSidebar(message.roomId, message.content, timeString, isMyMessage);
        }

        function updateSidebar(roomId, content, timeString, isMyMessage) {
            const roomItem = document.getElementById('room-item-' + roomId);
            if(roomItem) {
                const msgSpan = document.getElementById('room-msg-' + roomId);
                const timeSpan = document.getElementById('room-time-' + roomId);
                const badge = document.getElementById('unread-count-' + roomId);
                
                if(msgSpan) msgSpan.innerText = content;
                if(timeSpan) timeSpan.innerText = timeString;

                if(!isMyMessage && roomId !== currentRoomId) {
                    if(badge) {
                        let currentCount = parseInt(badge.innerText) || 0;
                        badge.innerText = currentCount + 1;
                        badge.style.display = 'inline-block';
                    }
                }

                const chatListContainer = document.getElementById('chatListContainer');
                if(chatListContainer) chatListContainer.prepend(roomItem);
            }
        }

        window.onload = function() {
            connect();
            const inputEl = document.getElementById('messageInput');
            if (inputEl) {
                inputEl.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') sendMessage();
                });
            }
        };
    </script>
</div>
</html>
