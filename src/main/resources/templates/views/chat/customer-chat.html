<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">

<div layout:fragment="content">
    <style>
        .chat-page-container { max-width: 1200px; margin: 40px auto; display: flex; height: 750px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; }
        .chat-sidebar { width: 320px; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid #eee; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .chat-item.active { background: #e7f1ff; border-left: 5px solid #0d6efd; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        
        
        .msg-bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg-right { align-self: flex-end; background: #0d6efd; color: #fff; border-bottom-right-radius: 2px; }
        .msg-left { align-self: flex-start; background: #fff; border: 1px solid #ddd; color: #333; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: #999; margin-top: 5px; display: block; }
    </style>

    <div class="chat-page-container shadow-sm">
        <div class="chat-sidebar">
            <div class="sidebar-header">나의 대화</div>
            <div class="chat-list" id="chatListContainer">
                <div th:each="room : ${myRooms}" 
                     class="chat-item" 
                     th:id="'room-item-' + ${room.roomId}"
                     th:classappend="${currentRoomId != null && room.roomId == currentRoomId ? 'active' : ''}"
                     th:onclick="|location.href='/chat?roomId=' + ${room.roomId}|">
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold" th:text="${room.partnerName}"></span>
                        <small th:id="'room-time-' + ${room.roomId}" th:text="${room.lastMessageTime}"></small>
                    </div>
                    <div class="text-muted small text-truncate mt-1" th:id="'room-msg-' + ${room.roomId}" th:text="${room.lastMessage}"></div>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-body" id="chatBody">
                <div th:each="msg : ${messages}" 
                     class="msg-bubble" 
                     th:classappend="${msg.senderType == 'CUSTOMER' ? 'msg-right' : 'msg-left'}">
                    <span th:text="${msg.content}"></span>
                    <span class="msg-time" th:text="${msg.sendAt}"></span>
                </div>
                
                <div th:if="${currentRoomId == null}" class="m-auto text-muted">
                    대화방을 선택해 주세요.
                </div>
            </div>

            <div class="chat-footer p-3 bg-white border-top" th:if="${currentRoomId != null}">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="메시지를 입력하세요...">
                    <button class="btn btn-primary" onclick="sendMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        const chatBody = document.getElementById('chatBody');
        if(chatBody) chatBody.scrollTop = chatBody.scrollHeight;

        let stompClient = null;
        const currentRoomId = [[${currentRoomId}]]; 
        const myId = [[${myId}]]; 

        function connect() {
            if (!currentRoomId) return; 
            
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/sub/chat/room/' + currentRoomId, function (message) {
                    const receivedMessage = JSON.parse(message.body);
                    appendMessageToScreen(receivedMessage);
                });
            });
        }

        function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            if(!inputElement) return;
            const content = inputElement.value;
            
            if(content && stompClient) {
                const chatMessageDTO = {
                    roomId: currentRoomId,
                    senderId: myId,
                    senderType: 'CUSTOMER',
                    content: content
                };
                
                stompClient.send("/pub/chat/send", {}, JSON.stringify(chatMessageDTO));
                inputElement.value = ''; 
            }
        }

        function appendMessageToScreen(message) {
            const box = document.getElementById('chatBody');
            if(!box) return;

            const wrapper = document.createElement('div');
            wrapper.classList.add('msg-bubble');
            
            if(message.senderId === myId && message.senderType === 'CUSTOMER') {
                wrapper.classList.add('msg-right');
            } else {
                wrapper.classList.add('msg-left');
            }
            
            const contentSpan = document.createElement('span');
            contentSpan.innerText = message.content;
            
            const timeSpan = document.createElement('span');
            timeSpan.classList.add('msg-time');
            
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const timeString = h + ':' + m;
            timeSpan.innerText = timeString;
            
            wrapper.appendChild(contentSpan);
            wrapper.appendChild(timeSpan);
            box.appendChild(wrapper);
            
            box.scrollTop = box.scrollHeight;

            updateSidebar(message.roomId, message.content, timeString);
        }

        function updateSidebar(roomId, content, timeString) {
            const roomItem = document.getElementById('room-item-' + roomId);
            if(roomItem) {
                const msgSpan = document.getElementById('room-msg-' + roomId);
                const timeSpan = document.getElementById('room-time-' + roomId);
                
                if(msgSpan) msgSpan.innerText = content;
                if(timeSpan) timeSpan.innerText = timeString;

                const chatListContainer = document.getElementById('chatListContainer');
                if(chatListContainer) {
                    chatListContainer.prepend(roomItem);
                }
            }
        }

        window.onload = function() {
            connect();
            document.getElementById('messageInput')?.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        };
    </script>
</div>
</html>
