<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">

<div layout:fragment="content">
    <style>
        .chat-page-container { max-width: 1200px; margin: 40px auto; display: flex; height: 750px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; }
        .chat-sidebar { width: 320px; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid #eee; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .chat-item.active { background: #e7f1ff; border-left: 5px solid #0d6efd; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; align-items: flex-end; width: 100%; margin-bottom: 5px; }
        .msg-row.right { flex-direction: row-reverse; }
        .msg-row.left { flex-direction: row; }
        .msg-bubble { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; word-break: break-all; }
        .msg-right { background: linear-gradient(135deg, #6e8efb, #a777e3); color: #fff; border-bottom-right-radius: 2px; border: none; }      
        .msg-left { background: #fff; border: 1px solid #ddd; color: #333; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 11px; color: #999; margin: 0 8px; white-space: nowrap; }
        .photo-btn { background: none; border: none; padding: 0 10px; cursor: pointer; color: #6c757d; font-size: 1.5rem; }
        #messageInput { border-radius: 20px; padding: 10px 15px; border: 1px solid #ced4da; }
        .msg-image-only { background: transparent !important; padding: 0 !important; border: none !important; }
        .date-divider { width: 100%; text-align: center; border-bottom: 1px solid #eee; line-height: 0.1em; margin: 20px 0; }
        .date-divider span { background:#fdfdfd; padding:0 15px; color: #999; font-size: 12px; }
        #imagePreviewContainer { display: none !important; padding: 10px; border-top: 1px solid #eee; background: #f9f9f9; position: relative; }
        #imagePreview { max-width: 100px; max-height: 100px; border-radius: 8px; border: 1px solid #ddd; }
        #clearImageBtn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>

    <div class="chat-page-container shadow-sm">
        <div class="chat-sidebar">
            <div class="sidebar-header">나의 대화</div>
            <div class="chat-list" id="chatListContainer">
                <div th:each="room : ${myRooms}" 
                     class="chat-item" 
                     th:id="'room-item-' + ${room.roomId}"
                     th:classappend="${currentRoomId != null && room.roomId == currentRoomId ? 'active' : ''}"
                     th:onclick="|location.href='/chat?roomId=' + ${room.roomId}|">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold" th:text="${room.partnerName}"></span>
                        <div>
                            <span th:if="${room.unreadCount != null and room.unreadCount > 0}" 
                                  class="badge bg-danger rounded-pill me-1" 
                                  th:id="'unread-count-' + ${room.roomId}" 
                                  th:text="${room.unreadCount}"></span>
                            <small class="room-time-text" th:id="'room-time-' + ${room.roomId}" th:data-time="${room.lastMessageTime}"></small>
                        </div>
                    </div>
                    <div style="font-size: 12px; margin-top: 4px;" class="text-truncate">
                        <span th:if="${room.requestTitle != null}" style="color: #0d6efd; font-weight: bold;" th:text="'[' + ${room.requestTitle} + '] '"></span>
                        <span th:if="${room.bidPrice != null}" style="color: #0d6efd;" th:text="${#numbers.formatInteger(room.bidPrice, 0, 'COMMA')} + '원'"></span>
                    </div>
                    <div class="text-muted small text-truncate mt-1" th:id="'room-msg-' + ${room.roomId}" 
                         th:text="${room.lastMessage != null && #strings.startsWith(room.lastMessage, '/images/') ? '(사진)' : room.lastMessage}"></div>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="p-0 border-bottom bg-white" th:if="${currentRoomId != null}">
                <div th:each="room : ${myRooms}" th:if="${room.roomId == currentRoomId}"
                     class="p-3 d-flex justify-content-between align-items-center"
                     th:onclick="|location.href='/customer/request/detail/' + ${room.requestId}|"
                     style="cursor: pointer;">
                    <div class="d-flex flex-column">
                        <div class="fw-bold" style="font-size: 16px;" th:text="${room.partnerName}"></div>
                        <div style="font-size: 13px; color: #0d6efd; margin-top: 4px;">
                            <span th:if="${room.requestTitle != null}" th:text="${room.requestTitle}"></span>
                            <strong th:if="${room.bidPrice != null}" style="margin-left: 5px;" th:text="${#numbers.formatInteger(room.bidPrice, 0, 'COMMA')} + '원'"></strong>
                        </div>
                    </div>
                    <div class="text-muted" style="font-size: 13px;">의뢰 상세보기 <i class="bi bi-chevron-right"></i></div>
                </div>
            </div>

            <div class="chat-body" id="chatBody">
                <div th:if="${currentRoomId == null}" class="m-auto text-muted">대화방을 선택해 주세요.</div>
            </div>

            <div id="imagePreviewContainer">
                <img id="imagePreview" src=""><button id="clearImageBtn" onclick="clearImagePreview()">X</button>
            </div>

            <div class="chat-footer p-3 bg-white border-top" th:if="${currentRoomId != null}">
                <div class="input-group">
                    <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="previewFile()">
                    <button class="photo-btn" onclick="document.getElementById('fileInput').click()">&#128247;</button> 
                    <input type="text" id="messageInput" class="form-control" placeholder="메시지를 입력하세요...">
                    <button class="btn btn-primary send-btn" onclick="sendMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        const chatBody = document.getElementById('chatBody');
        let stompClient = null;
        const currentRoomId = [[${currentRoomId}]]; 
        const myId = [[${myId}]]; 
        const userType = [[${userType}]];
        const initialMessages = [[${messages}]];
        let selectedFile = null;
        let currentPage = 1;
        let isLoading = false;
        let isLastPage = false;

        function formatDisplayDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const targetDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const diffDays = Math.floor((today - targetDate) / (24 * 60 * 60 * 1000));
            if (diffDays === 0) return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            if (diffDays === 1) return '어제';
            return d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0') + '-' + d.getDate().toString().padStart(2, '0');
        }

        function formatBubbleTime(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function updateDateDividers() {
            document.querySelectorAll('.date-divider').forEach(el => el.remove());
            let lastDate = null;
            const messages = chatBody.querySelectorAll('.msg-row');
            
            messages.forEach(row => {
                const rawTime = row.dataset.rawTime;
                if(!rawTime) return;
                
                const d = new Date(parseInt(rawTime));
                const dateStr = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
                
                if (lastDate !== dateStr) {
                    const divider = document.createElement('div');
                    divider.className = 'date-divider';
                    const days = ['일', '월', '화', '수', '목', '금', '토'];
                    divider.innerHTML = `<span>${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일</span>`;
                    row.parentNode.insertBefore(divider, row);
                    lastDate = dateStr;
                }
            });
        }


        function markAsRead(roomId) {
            if(!roomId) return;
            const badge = document.getElementById('unread-count-' + roomId);
            if(badge) badge.style.display = 'none'; 
            fetch(`/chat/read/${roomId}?userType=${userType}`, { method: 'POST' }); 
        }

        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/sub/chat/user/' + userType + '/' + myId, function (message) {
                    const msg = JSON.parse(message.body);
                    updateSidebar(msg.roomId, msg.content, msg.messageType, msg.sendAt);
                });
                if (currentRoomId) {
                    stompClient.subscribe('/sub/chat/room/' + currentRoomId, function (message) {
                        const msg = JSON.parse(message.body);
                        appendMessageToScreen(msg);
                        if(msg.senderType !== userType) markAsRead(currentRoomId);
                    });
                }
            });
        }

        function appendMessageToScreen(message, isInitial = false, isPrepend = false) {
            if(!chatBody) return;
            const dateObj = message.sendAt ? new Date(message.sendAt) : new Date();
            const row = document.createElement('div');
            row.dataset.rawTime = dateObj.getTime();
            
            const isMy = message.senderId === myId && message.senderType === userType;
            row.className = `msg-row ${isMy ? 'right' : 'left'}`;
            let content = '';
            if (message.messageType === 'IMAGE') {
                content = `<div class="msg-bubble msg-image-only ${isMy ? 'msg-right' : 'msg-left'}"><img src="${message.content}" style="max-width:200px; border-radius:8px;"></div>`;
            } else {
                content = `<div class="msg-bubble ${isMy ? 'msg-right' : 'msg-left'}"><span>${message.content}</span></div>`;
            }
            row.innerHTML = content + `<span class="msg-time">${formatBubbleTime(dateObj)}</span>`;
            if (isPrepend) {
                chatBody.prepend(row);
            } else {
                chatBody.appendChild(row);
            }
            if(!isInitial && !isPrepend) {
                updateDateDividers();
                chatBody.scrollTop = chatBody.scrollHeight;
                updateSidebar(message.roomId, message.content, message.messageType, message.sendAt);
            }
        }

        function loadMoreMessages() {
            if (isLoading || isLastPage || !currentRoomId) return;
            isLoading = true;
            const prevHeight = chatBody.scrollHeight;
            fetch(`/chat/messages/paging?roomId=${currentRoomId}&page=${currentPage}`)
                .then(res => res.json())
                .then(data => {
                    if (data.length < 20) isLastPage = true;
                    if (data.length > 0) {
                        data.forEach(msg => appendMessageToScreen(msg, true, true));
                        updateDateDividers();
                        chatBody.scrollTop = chatBody.scrollHeight - prevHeight;
                        currentPage++;
                    }
                    isLoading = false;
                });
        }

        function updateSidebar(roomId, content, messageType, sendAt) {
            const roomItem = document.getElementById('room-item-' + roomId);
            if(roomItem) {
                const msgSpan = document.getElementById('room-msg-' + roomId);
                const timeSpan = document.getElementById('room-time-' + roomId);
                if(msgSpan) msgSpan.innerText = (messageType === 'IMAGE' || content.startsWith('/images/')) ? '(사진)' : content;
                if(timeSpan) timeSpan.innerText = formatDisplayDate(sendAt || new Date());
                document.getElementById('chatListContainer')?.prepend(roomItem);
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if(!input || (!input.value.trim() && !selectedFile)) return;
            if (selectedFile) {
                const formData = new FormData();
                formData.append("file", selectedFile);
                fetch('/chat/upload', { method: 'POST', body: formData }).then(res => res.text()).then(url => {
                    stompClient.send("/pub/chat/send", {}, JSON.stringify({ roomId: currentRoomId, senderId: myId, senderType: userType, messageType: 'IMAGE', content: url }));
                    clearImagePreview();
                    if(input.value.trim()) { sendTextMessage(input.value.trim()); input.value = ''; }
                });
            } else {
                sendTextMessage(input.value.trim());
                input.value = ''; 
            }
        }

        function sendTextMessage(content) {
            stompClient.send("/pub/chat/send", {}, JSON.stringify({ roomId: currentRoomId, senderId: myId, senderType: userType, messageType: 'TEXT', content: content }));
        }

        function previewFile() {
            selectedFile = document.getElementById('fileInput').files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreviewContainer').setAttribute('style', 'display: block !important');
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        function clearImagePreview() {
            const input = document.getElementById('fileInput');
            if(input) input.value = '';
            selectedFile = null;
            document.getElementById('imagePreviewContainer').setAttribute('style', 'display: none !important');
        }

        window.onload = function() {
            document.querySelectorAll('.room-time-text').forEach(el => {
                el.innerText = formatDisplayDate(el.getAttribute('data-time'));
            });


            document.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', function() {
                    const badge = this.querySelector('.badge.bg-danger');
                    if(badge) badge.style.display = 'none';
                });
            });

            connect();
            if(currentRoomId) {

                const currentBadge = document.getElementById('unread-count-' + currentRoomId);
                if(currentBadge) currentBadge.style.display = 'none';

                markAsRead(currentRoomId);
                if(initialMessages) { 
                    initialMessages.forEach(m => appendMessageToScreen(m, true)); 
                    updateDateDividers();
                    chatBody.scrollTop = chatBody.scrollHeight; 
                }
            }
            chatBody.addEventListener('scroll', () => { if (chatBody.scrollTop === 0) loadMoreMessages(); });
            document.getElementById('messageInput')?.addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
        };
    </script>
</div>
</html>
