<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nextage - 기업 회원가입</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script th:src="@{/js/joinmypage/bjoin.js}"></script>
	
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Pretendard', sans-serif;
        }

        .register-wrapper {
            max-width: 500px; 
            width: 100%;
            padding: 2.5rem 2.5rem;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            margin: 3rem auto;
        }

        .logo-image { height: 58px; width: auto; margin-bottom: 0.5rem; }
        .sub-title { color: #666666; font-size: 0.95rem; margin-bottom: 2rem; }

        /* 🌟 기업용 메인 커스텀 버튼 (#333) */
        .btn-custom {
            background-color: #333333;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            padding: 0.9rem;
            border: none;
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
        }
        .btn-custom:hover { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            box-shadow: 0 4px 12px rgba(51, 51, 51, 0.2); 
        }

        /* 🌟 기업용 인라인 버튼 (인증하기, 우편번호 등) */
        .btn-inline {
            height: 58px; 
            width: 100%;
            border-radius: 6px; /* 기업용 메인 버튼과 동일한 모서리 각도 */
            background-color: #ffffff;
            border: 1px solid #333333; /* 테두리 #333 통일 */
            color: #333333;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-inline:hover {
            background-color: #333333; /* 마우스 올리면 메인 버튼처럼 변함 */
            color: #ffffff;
        }

        /* 포커스 효과 */
        .form-control { border-radius: 6px; }
        .form-control:focus {
            border-color: #333333;
            box-shadow: 0 0 0 0.25rem rgba(51, 51, 51, 0.15);
        }

        /* 읽기 전용(readonly) 입력창 배경색 처리 */
        .form-control[readonly] {
            background-color: #f8f9fa;
        }

        /* 🌟 라벨 텍스트 색상 통일 */
        .form-floating label { color: #666666; }
        .label-optional { color: #888888 !important; } /* 선택 항목은 살짝 연하게 */

        .login-link { color: #333; font-weight: 700; text-decoration: none; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body class="d-flex min-vh-100 justify-content-center align-items-center">

    <div class="register-wrapper text-center">
        <img th:src="@{/images/logo2.png}" alt="Nextage Logo" class="logo-image">
        <p class="sub-title">기업 파트너 회원가입</p>

        <form action="/auth/business/registerProc" method="post">
            
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="loginId" name="loginId" placeholder="기업 아이디" required>
                <label for="loginId">아이디</label>
            </div>

            <div class="form-floating mb-3 text-start">
                <input type="password" class="form-control" id="passwordHash" name="passwordHash" placeholder="비밀번호" required>
                <label for="passwordHash">비밀번호-숫자,영어조합 6자 이상</label>
            </div>

            <div class="form-floating mb-4 text-start">
                <input type="password" class="form-control" id="passwordCheck" name="passwordCheck" placeholder="비밀번호 확인" required>
                <label for="passwordCheck">비밀번호 확인</label>
            </div>
            
            <!-- 전화번호 -->
            <div class="row g-2 mb-4">
                <div class="col-8 form-floating text-start">
                    <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="전화번호" required>
                    <label for="phoneNumber" style="left: 0.25rem;">담당자 연락처 ('-' 제외)</label>
                </div>
                <div class="col-4">
                    <button type="button" class="btn-inline" onclick="phoneCheck()">인증하기</button>
                </div>
            </div>

            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="companyName" name="companyName" placeholder="기업명" required>
                <label for="companyName">기업명 / 상호명</label>
            </div>

            <button type="submit" class="btn btn-custom w-100">가입하기</button>
        </form>

        <div class="mt-4">
            <span style="color: #888; font-size: 0.9rem;">이미 기업 회원이신가요? </span>
            <a href="/auth/business/login" class="login-link" style="font-size: 0.95rem;">로그인</a>
        </div>
    </div>

</body>
</html>
