<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nextage - 기업 로그인</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* 폰트 설정 (깔끔한 고딕 계열) */
        body {
            background-color: #f8f9fa; /* 밝고 부드러운 배경색 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 로그인 카드 컨테이너 설정 */
        .login-wrapper {
            max-width: 400px;
            width: 100%;
            padding: 2.5rem 2rem;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05); /* 부드러운 그림자 */
        }

        .logo-image {
            height: 58px; /* 이전 텍스트 2.2rem과 비슷한 높이 */
            width: auto;  /* 가로 세로 비율 유지 */
            margin-bottom: 2rem; /* 아래 서브타이틀과의 간격 */
        }



        /* #333 커스텀 버튼 */
        .btn-custom {
            background-color: #333333;
            color: #ffffff;
            font-weight: 600;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
        }

        .btn-custom:hover, .btn-custom:focus {
            background-color: #1a1a1a; /* 마우스 오버시 살짝 더 어두워짐 */
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(51, 51, 51, 0.2);
        }

        /* 입력창 포커스 시 #333 컬러 적용 */
        .form-control:focus {
            border-color: #333333;
            box-shadow: 0 0 0 0.25rem rgba(51, 51, 51, 0.15);
        }

        /* 보조 링크 스타일 */
        .auth-links a {
            color: #888888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .auth-links a:hover {
            color: #333333;
        }
    </style>
</head>
<body class="d-flex vh-100 justify-content-center align-items-center">

    <div class="login-wrapper text-center">
        <!-- 로고 및 타이틀 -->
        <img th:src="@{/images/logo2.png}" alt="Nextage Logo" class="logo-image">

        <!-- 에러 메시지 (Thymeleaf) -->
        <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size: 0.9rem;" role="alert">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>

        <!-- 로그인 폼 -->
        <form action="/auth/business/loginProc" method="post">
            
            <!-- 아이디 입력 (플로팅 라벨) -->
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="loginId" name="loginId" placeholder="기업 아이디" required>
                <label for="loginId" style="color: #666;">기업 아이디</label>
            </div>

            <!-- 비밀번호 입력 (플로팅 라벨) -->
            <div class="form-floating mb-4 text-start">
                <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호" required>
                <label for="password" style="color: #666;">비밀번호</label>
            </div>

            <!-- 제출 버튼 -->
            <button type="submit" class="btn btn-custom w-100">로그인</button>
        </form>

        <!-- 하단 보조 링크 (아이디/비번 찾기, 회원가입 등 - 필요에 따라 사용) -->
        <div class="auth-links mt-4 d-flex justify-content-center gap-3">
            <a href="#" style="color: #333; font-weight: 600;">아이디 찾기</a>
            <span style="color: #ddd;">|</span>
            <a href="#" style="color: #333; font-weight: 600;" >비밀번호 찾기</a>
            <span style="color: #ddd;">|</span>
            <a href="#" style="color: #333; font-weight: 600;">회원가입</a>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
