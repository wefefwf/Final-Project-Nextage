<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>고객 로그인 (임시)</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>👩‍🦰 고객(Customer) 로그인 테스트</h2>
    
    <div th:if="${param.error}"><p style="color:red;">아이디 또는 비밀번호가 틀렸습니다.</p></div>
    <div th:if="${param.logout}"><p style="color:blue;">로그아웃 되었습니다.</p></div>

    <!-- SecurityConfig의 loginProcessingUrl("/auth/loginProc") 과 일치 -->
    <form action="/auth/loginProc" method="post">
        <div>
            <!-- Config에서 usernameParameter("loginId")로 설정했으므로 name="loginId" 필수 -->
            <label>아이디: </label>
            <input type="text" name="loginId" placeholder="고객 아이디" required>
        </div>
        <div>
            <label>비밀번호: </label>
            <input type="password" name="password" placeholder="비밀번호" required>
        </div>
        <br>
        <button type="submit">고객 로그인</button>
    </form>
</body>
</html>
