 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nextage - 고객 로그인</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* 그라데이션 컬러 설정 */
        :root {
            --grad-start: #fbc2eb;
            --grad-end: #a6c1ee;
            --main-gradient: linear-gradient(to right, var(--grad-start), var(--grad-end));
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-wrapper {
            max-width: 400px;
            width: 100%;
            padding: 2.5rem 2rem;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }


        .logo-image {
            height: 58px; 
            width: auto;
            margin-bottom: 2rem;
        }


        .btn-gradient {
            background: var(--main-gradient);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            padding: 0.9rem;
            border: none;
            border-radius: 25px; 
            transition: opacity 0.3s ease;
        }

        .btn-gradient:hover, .btn-gradient:focus {
            opacity: 0.85; 
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(166, 193, 238, 0.4);
        }

        .form-control:focus {
            border-color: var(--grad-end);
            box-shadow: 0 0 0 0.25rem rgba(166, 193, 238, 0.3); 
            border-radius: 8px; 
        }
        
        .form-control {
            border-radius: 8px;
        }

        .auth-links a {
            color: #888888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .auth-links a:hover {
            color: var(--grad-end);
        }


        .text-gradient {
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .text-gradient:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body class="d-flex vh-100 justify-content-center align-items-center">

    <div class="login-wrapper text-center">
        <a th:href="@{/customer/main}">
            <img th:src="@{/images/logo.png}" alt="Nextage Logo" class="logo-image">
        </a>

        <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size: 0.9rem; border-radius: 8px;" role="alert">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>


        <form action="/auth/loginProc" method="post">
            
            <!-- 아이디 입력 -->
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="loginId" name="loginId" placeholder="아이디" required>
                <label for="loginId" style="color: #888;">아이디</label>
            </div>

            <!-- 비밀번호 입력 -->
            <div class="form-floating mb-4 text-start">
                <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호" required>
                <label for="password" style="color: #888;">비밀번호</label>
            </div>


            <button type="submit" class="btn btn-gradient w-100">로그인</button>
        </form>

        <!-- 하단 보조 링크 -->
        <div class="auth-links mt-4 d-flex justify-content-center gap-3 align-items-center">
            <a href="#" style="color: #333; font-weight: 600;">아이디 찾기</a>
            <span style="color: #ddd;">|</span>
            <a href="#" style="color: #333; font-weight: 600;" >비밀번호 찾기</a>
            <span style="color: #ddd;">|</span>
            <a href="/customer/join" style="color: #333; font-weight: 600;">회원가입</a>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
