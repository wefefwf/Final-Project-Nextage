<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">
<head>
<meta charset="UTF-8">
<title>Nextage*Business</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" th:href="@{/css/businessMain/businessMain.css}" />
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
<style>
    .filter-btn { cursor: pointer; transition: all 0.3s; }
    .filter-btn.active { background-color: #000; color: #fff; font-weight: bold; }
    .main-request-item { display: flex; transition: opacity 0.3s ease; }

    .order-box {
        height: 240px;
        overflow-y: auto;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        background: #fff;
    }

    .order-box-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        color: #b8b8b8;
        font-size: 15px;
        font-weight: 600;
    }
</style>
</head>
<body>
<th:block layout:fragment="content">
    <main class="main-content">
        <section class="section-top">
            <div class="calendar-group">
                <h3>Calendar</h3>
                <div class="box-gray cal-main"></div>
                <div class="box-gray cal-sub"></div>
                <div class="link-wrapper">
                    <a href="#" class="view-all">전체 보러가기 →</a>
                </div>
            </div>

            <div class="side-group">
                <div class="order-zone">
                    <h3>New Order</h3>
                    <div class="order-box">

                        <!-- 비로그인 -->
                        <div th:if="${businessId == null}" class="order-box-empty">
                        <i class="bi bi-patch-question" style="font-size: 3rem; display: block; margin-bottom: 14px; color: #c8c8c8;"></i>
                            로그인 후 확인해주세요.
                        </div>

                        <!-- 로그인 + 주문 없음 -->
                        <div th:if="${businessId != null and #lists.isEmpty(pendingOrders)}"
                             class="order-box-empty">
                            새로운 주문이 없습니다.
                        </div>

                        <!-- 주문 목록 -->
                        <div th:if="${businessId != null and !#lists.isEmpty(pendingOrders)}"
                             style="width:100%;">
                            <div th:each="order : ${pendingOrders}"
                                 style="padding:12px 16px; border-bottom:1px solid #f0f0f0;
                                        cursor:pointer; transition:background 0.15s;"
                                 th:onclick="|location.href='/business/order/history'|"
                                 onmouseover="this.style.background='#f7f7f7'"
                                 onmouseout="this.style.background='#fff'">
                                <div style="font-size:13px; font-weight:700; color:#222; margin-bottom:4px;"
                                     th:text="${order.customerNickname} + ' 님의 주문'"></div>
                                <div style="font-size:12px; color:#aaa;"
                                     th:text="${order.items != null and !#lists.isEmpty(order.items)}
                                               ? ${order.items[0].productName} +
                                                 (${#lists.size(order.items)} > 1
                                                  ? ' 외 ' + (${#lists.size(order.items)} - 1) + '건'
                                                  : '')
                                               : '상품 정보 없음'">
                                </div>
                                <div style="font-size:13px; font-weight:800; color:#333; margin-top:4px;"
                                     th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA')} + '원'">
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="link-wrapper">
                        <a th:href="@{/business/order/history}" class="view-all">전체 보러가기 →</a>
                    </div>
                </div>

                <div class="vertical-dots">
                    <span>●</span>
                    <span>●</span>
                    <span>●</span>
                </div>

                <div class="notice-zone">
                    <h3>Notice</h3>
                    <div class="box-gray notice-box"></div>
                    <div class="link-wrapper">
                        <a href="#" class="view-all">전체 보러가기 →</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- 포트폴리오 -->
        <section class="section-portfolio">
            <div class="portfolio-header">
                <h3>My PortFolio</h3>
                <a th:href="@{/business/my-portfolio}" class="post-view-all">전체 보러가기 <span>→</span></a>
            </div>

            <div class="portfolio-full">
                <div class="portfolio-slider" th:if="${!#lists.isEmpty(portfolioList)}"
                     th:classappend="${#lists.size(portfolioList) < 4} ? 'no-slider' : ''">
                    <div class="portfolio-card" th:each="pf : ${portfolioList}"
                         th:onclick="|location.href='/business/my-portfolio?reviewId=' + ${pf.reviewId}|">
                        <div class="card-img-wrap">
                            <img th:src="${pf.image1 ?: '/image/no-image.png'}" alt="포트폴리오">
                        </div>
                        <div class="card-info">
                            <p class="card-title" th:text="${pf.requestTitle}">작업 제목</p>
                            <span class="card-no" th:text="'No. ' + ${pf.orderNo}">No. 00</span>
                        </div>
                    </div>
                </div>

                <div class="portfolio-empty" th:unless="${!#lists.isEmpty(portfolioList)}">
                    <div sec:authorize="isAnonymous()">
                        <p>로그인 후 멋진 포트폴리오를 확인해보세요!</p>
                        <a th:href="@{/business/login}" class="btn-go-list">로그인하기 →</a>
                    </div>
                    <div sec:authorize="isAuthenticated()">
                        <p th:text="|${companyName}님의 멋진 포트폴리오를 채워보세요!|">
                            업체명님의 멋진 포트폴리오를 채워보세요!</p>
                        <a th:href="@{/business/request/list}" class="btn-go-list">제안하러 가기 →</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-post">
            <div class="post-header">
                <h3>New Post</h3>
                <a th:href="@{/business/request/list}" class="post-view-all">전체 보러가기 <span>→</span></a>
            </div>

            <div class="post-nav">
                <button class="filter-btn active" data-category="all">전체</button>
                <button class="filter-btn" data-category="2D Clothes">2D</button>
                <button class="filter-btn" data-category="3D Clothes">3D</button>
                <button class="filter-btn" data-category="3D Object">Object</button>
                <button class="filter-btn" data-category="Metal">Metal</button>
            </div>

            <div class="post-full">
                <div class="main-request-list">
                    <div th:if="${#lists.isEmpty(newPostList)}" class="empty-msg">
                        <p>새로운 의뢰가 없습니다.</p>
                    </div>
                    <div class="main-request-item" th:each="post : ${newPostList}"
                         th:data-category="${post.categoryName}"
                         th:onclick="|location.href='/business/request/detail/' + ${post.requestId}|"
                         style="cursor: pointer;">
                        <div class="item-left">
                            <img th:src="${post.thumbnailPath ?: '/image/no-image.png'}" class="mini-thumbnail">
                            <div class="item-text">
                                <span class="item-cat" th:text="${post.categoryName}">Category</span>
                                <h4 class="item-title" th:text="${post.title}">의뢰 제목</h4>
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="item-price">₩<span th:text="${#numbers.formatInteger(post.hopePrice, 0, 'COMMA')}">0</span></span>
                            <span class="item-date" th:text="${#strings.substring(post.createdAt, 0, 10)}">2026-03-12</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.filter-btn');
        const items   = document.querySelectorAll('.main-request-item');

        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                buttons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const targetCat = this.getAttribute('data-category').trim().toLowerCase();
                items.forEach(item => {
                    const itemCat = (item.getAttribute('data-category') || '').trim().toLowerCase();
                    item.style.display = (targetCat === 'all' || itemCat === targetCat) ? 'flex' : 'none';
                });
            });
        });
    });

    (function($) {
        $(function() {
            const slider = $('.portfolio-slider');
            if (typeof $.fn.slick !== 'undefined' && slider.find('.portfolio-card').length >= 4) {
                slider.slick({
                    infinite: true,
                    slidesToShow: 4,
                    slidesToScroll: 1,
                    autoplay: true,
                    autoplaySpeed: 0,
                    speed: 6000,
                    cssEase: 'linear',
                    arrows: false,
                    dots: false,
                    variableWidth: true,
                    pauseOnHover: false,
                    draggable: true
                });
            }
        });
    })(jQuery);
    </script>
</th:block>
</body>
</html>
