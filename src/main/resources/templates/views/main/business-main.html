<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">
<head>
<meta charset="UTF-8">
<title>__Nextage__*Business</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" th:href="@{/css/businessMain/businessMain.css}" />
<style>
    /* 필터 내비게이션 스타일 (이미지 기반) */
    .post-nav {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    /* '전체' 버튼 전용 스타일 */
    .all-btn {
        background-color: #212529;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 8px 18px;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
    }

    /* 그룹 캡슐 (Clothes, Accessories) */
    .filter-group {
        display: flex;
        align-items: center;
        background-color: #f1f3f5;
        border-radius: 20px;
        padding: 4px 16px;
        gap: 15px;
    }

    .group-label {
        font-size: 12px;
        font-weight: 800;
        color: #adb5bd;
        margin-right: 5px;
        letter-spacing: 0.5px;
    }

    .filter-btn {
        border: none;
        background: none;
        padding: 6px 4px;
        cursor: pointer;
        font-weight: 600;
        color: #495057;
        font-size: 14px;
        transition: color 0.2s;
    }

    /* 활성화 시 효과 (전체 버튼 제외한 나머지) */
    .filter-btn.active:not(.all-btn) {
        color: #000;
        font-weight: 800;
    }

    /* 아이템 레이아웃 유지 */
    .main-request-item { display: flex; cursor: pointer; }
</style>
</head>
<body>
 <th:block layout:fragment="content">
	<main class="main-content">
	  <section class="section-top">
	    <div class="calendar-group">
	      <h3>Calendar</h3>
	      <div class="box-gray cal-main"></div>
	      <div class="box-gray cal-sub"></div>
	      <div class="link-wrapper">
	        <a href="#" class="view-all">전체 보러가기 →</a>
	      </div>
	    </div>

	    <div class="side-group">
	      <div class="order-zone">
	        <h3>New Order</h3>
	        <div class="box-gray order-box"></div>
	        <div class="link-wrapper">
	          <a href="#" class="view-all">전체 보러가기 →</a>
	        </div>
	      </div>

	      <div class="vertical-dots">
	        <span>●</span>
	        <span>●</span>
	        <span>●</span>
	      </div>

	      <div class="notice-zone">
	        <h3>Notice</h3>
	        <div class="box-gray notice-box"></div>
	        <div class="link-wrapper">
	          <a href="#" class="view-all">전체 보러가기 →</a>
	        </div>
	      </div>
	    </div>
	  </section>

	  <section class="section-portfolio">
	    <h3>My PortFolio</h3>
	    <div class="box-gray portfolio-full"></div>
	  </section>

	  <section class="section-post">
	    <div class="post-header">
	      <h3>New Post</h3>
	      <a th:href="@{/business/request/list}" class="post-view-all">전체 보러가기 <span>→</span></a>
	    </div>

	    <div class="post-nav">
	      <button class="filter-btn all-btn active" data-category="all">전체</button>
	      
	      <div class="filter-group">
	        <span class="group-label">CLOTHES</span>
	        <button class="filter-btn" data-category="2D Clothes">2D</button>
	        <button class="filter-btn" data-category="3D Clothes">3D</button>
	      </div>

	      <div class="filter-group">
	        <span class="group-label">ACCESSORIES</span>
	        <button class="filter-btn" data-category="Object">Object</button>
	        <button class="filter-btn" data-category="Metal">Metal</button>
	      </div>
	    </div>

	    <div class="post-full">
	      <div class="main-request-list">
	        <div th:if="${#lists.isEmpty(newPostList)}" class="empty-msg">
	          <p>새로운 의뢰가 없습니다.</p>
	        </div>

	        <div class="main-request-item" th:each="post : ${newPostList}"
	             th:data-category="${post.categoryName}"
	             th:onclick="|location.href='/customer/request/detail/' + ${post.requestId}|">
	          <div class="item-left">
	            <img th:src="${post.thumbnailPath ?: '/image/no-image.png'}" class="mini-thumbnail">
	            <div class="item-text">
	              <span class="item-cat" th:text="${post.categoryName}">Category</span>
	              <h4 class="item-title" th:text="${post.title}">의뢰 제목</h4>
	            </div>
	          </div>
	          <div class="item-right">
	            <span class="item-price">₩<span th:text="${#numbers.formatInteger(post.hopePrice, 0, 'COMMA')}">0</span></span>
	            <span class="item-date" th:text="${#strings.substring(post.createdAt, 0, 10)}">2026-03-12</span>
	          </div>
	        </div>
	      </div>
	    </div>
	  </section>
	</main>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.filter-btn');
        const items = document.querySelectorAll('.main-request-item');

        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // 1. 버튼 활성화 상태 업데이트
                buttons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const targetCat = this.getAttribute('data-category');

                // 2. 카테고리에 따른 리스트 필터링 (대소문자 구분 없이 비교하려면 toLowerCase 사용 가능)
                items.forEach(item => {
                    const itemCat = item.getAttribute('data-category');

                    if (targetCat === 'all' || itemCat === targetCat) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });
    });
    </script>
</th:block>
</body>
</html>
