<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{|layouts/${userType}-layout|}">
<head>
    <title>공지 상세</title>
<link rel="stylesheet" th:href="@{/css/mypage/notice.css}">
</head>
<body>

<div layout:fragment="content">
    <div class="notice-board-container" style="max-width: 800px;">
        <div class="detail-card">
            <div class="item-top mb-3">
                <span class="target-badge" 
                      th:classappend="${notice.target == 'ALL' ? 'target-all' : (notice.target == 'CUSTOMER' ? 'target-customer' : 'target-business')}"
                      th:text="${notice.target}">ALL</span>
                <span class="notice-date" th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd HH:mm')}">2024.01.01</span>
            </div>
            
            <h1 class="item-title" style="font-size: 2rem; margin-bottom: 30px;" th:text="${notice.title}">공지사항 제목</h1>
            
            <hr style="border-color: #f5f5f7;">

            <div class="detail-content" th:utext="${notice.content}">
                본문 내용
            </div>

           <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
    <!-- 왼쪽: 목록 버튼 -->
    <a th:href="@{/notice}" class="action-btn">목록으로</a>
    
    <!-- 오른쪽: 수정/삭제 버튼 -->
		    <div sec:authorize="hasAnyRole('CADMIN', 'BADMIN')" class="d-flex gap-2">
		        <a th:href="@{/notice/edit/{id}(id=${notice.noticeId})}" class="action-btn">수정</a>
		        <form th:action="@{/notice/delete/{id}(id=${notice.noticeId})}" method="post" style="margin: 0;">
		            <button type="submit" class="action-btn danger" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
		        </form>
		    </div>
		</div>
        </div>
    </div>
</div>

</body>
</html>
