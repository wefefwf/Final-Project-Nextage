<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">
<head>
    <meta charset="UTF-8">
    <title>주문 상세 - Nextage</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: #fafafa; color: #333; }
        .detail-wrapper { max-width: 900px; margin: 40px auto; padding: 0 20px 80px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: #7c8cfb; font-weight: 600;
            text-decoration: none; margin-bottom: 24px; transition: gap 0.2s;
        }
        .back-btn:hover { gap: 10px; }
        .page-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px; font-weight: 900; color: #222; margin-bottom: 6px;
        }
        .page-subtitle { font-size: 14px; color: #aaa; margin-bottom: 32px; }
        .info-card {
            background: #fff; border: 1px solid #ebebeb; border-radius: 16px;
            padding: 24px 28px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .info-card-title {
            font-size: 11px; font-weight: 700; color: #bbb;
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 18px;
        }
        .info-row {
            display: flex; justify-content: space-between;
            font-size: 14px; margin-bottom: 12px; align-items: center;
        }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: #aaa; }
        .info-value { font-weight: 600; color: #333; }
        .info-value.paid { color: #7c8cfb; font-weight: 700; }
        .delivery-badge {
            font-size: 12px; font-weight: 700;
            padding: 4px 14px; border-radius: 20px;
            white-space: nowrap; display: inline-block;
        }
        .delivery-checking { background: #fef3e2; color: #e67e22; border: 1px solid #fad7a0; }
        .delivery-ready    { background: #eaf4fb; color: #2e86c1; border: 1px solid #aed6f1; }
        .delivery-ing      { background: #e8f0fe; color: #4285f4; border: 1px solid #c5d8fd; }
        .delivery-done     { background: #f0f0f0; color: #888;    border: 1px solid #e0e0e0; }
        .delivery-cancel   { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffc2c2; }
        .accept-badge {
            font-size: 12px; font-weight: 700;
            padding: 4px 14px; border-radius: 20px;
            white-space: nowrap; display: inline-block;
        }
        .accept-pending  { background: #fff8e1; color: #f59e0b; border: 1px solid #fde68a; }
        .accept-accepted { background: #eefbf3; color: #2ecc71; border: 1px solid #a7f3d0; }
        .accept-rejected { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffc2c2; }
        .delivery-tracker { display: flex; align-items: center; margin: 20px 0 8px; gap: 0; }
        .tracker-step {
            display: flex; flex-direction: column; align-items: center;
            flex: 1; position: relative;
        }
        .tracker-step:not(:last-child)::after {
            content: ''; position: absolute; top: 14px; left: 50%;
            width: 100%; height: 2px; background: #ebebeb; z-index: 0;
        }
        .tracker-step.active::after { background: linear-gradient(135deg, #7c8cfb, #5aa9ff); }
        .tracker-dot {
            width: 28px; height: 28px; border-radius: 50%;
            background: #ebebeb; border: 2px solid #e0e0e0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; position: relative; transition: all 0.3s;
        }
        .tracker-step.active .tracker-dot {
            background: linear-gradient(135deg, #7c8cfb, #5aa9ff); border-color: #7c8cfb;
        }
        .tracker-step.current .tracker-dot {
            background: linear-gradient(135deg, #7c8cfb, #5aa9ff); border-color: #7c8cfb;
            box-shadow: 0 0 0 4px rgba(124,140,251,0.2);
        }
        .tracker-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: #fff; }
        .tracker-label {
            font-size: 11px; font-weight: 600; color: #bbb;
            margin-top: 8px; text-align: center; white-space: nowrap;
        }
        .tracker-step.active .tracker-label,
        .tracker-step.current .tracker-label { color: #7c8cfb; }
        .order-item-row {
            display: flex; align-items: center;
            gap: 16px; padding: 18px 0; border-bottom: 1px solid #f5f5f5;
        }
        .order-item-row:last-of-type { border-bottom: none; }
        .item-img {
            width: 72px; height: 72px; object-fit: cover;
            border-radius: 12px; border: 1px solid #eee; flex-shrink: 0;
            transition: opacity 0.2s;
        }
        .item-img:hover { opacity: 0.85; }
        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 15px; font-weight: 700; color: #222; margin-bottom: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: pointer; transition: color 0.2s;
        }
        .item-name:hover { color: #7c8cfb; }
        .item-qty { font-size: 13px; color: #bbb; }
        .item-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 17px; font-weight: 900; color: #333;
            flex-shrink: 0; min-width: 90px; text-align: right;
        }
        .total-row {
            display: flex; justify-content: space-between;
            align-items: center; padding-top: 20px;
            border-top: 1px solid #f0f0f0; margin-top: 4px;
        }
        .total-label { font-size: 16px; font-weight: 700; color: #333; }
        .total-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px; font-weight: 900;
            background: linear-gradient(to right, #7c8cfb, #5aa9ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .action-area {
            background: #fff; border: 1px solid #ebebeb; border-radius: 16px;
            padding: 20px 28px; display: flex;
            justify-content: space-between; align-items: center;
            gap: 12px; flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .action-area-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 22px; font-size: 13px; font-weight: 700;
            border-radius: 20px; cursor: pointer; border: none;
            transition: all 0.2s; white-space: nowrap;
            text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-blue {
            color: #fff; background: linear-gradient(135deg, #7c8cfb, #5aa9ff);
            box-shadow: 0 2px 10px rgba(124,140,251,0.35);
        }
        .btn-blue:hover { transform: translateY(-2px); color: #fff; }
        .btn-green {
            color: #fff; background: linear-gradient(135deg, #6dca8a, #a8e6cf);
            box-shadow: 0 2px 10px rgba(109,202,138,0.3);
        }
        .btn-green:hover { transform: translateY(-2px); color: #fff; }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
            z-index: 10000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 24px; padding: 36px 32px;
            width: 420px; max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            position: relative; animation: slideUp 0.3s ease;
        }
        .modal-close {
            position: absolute; top: 16px; right: 20px;
            border: none; background: none; font-size: 22px; color: #ccc; cursor: pointer;
        }
        .modal-close:hover { color: #888; }
        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px; font-weight: 900; color: #222; margin-bottom: 4px;
        }
        .modal-subtitle { font-size: 13px; color: #aaa; margin-bottom: 24px; }
        .delivery-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
        .delivery-option {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px; border-radius: 12px;
            border: 2px solid #e8e8e8; cursor: pointer; transition: all 0.2s; background: #fff;
        }
        .delivery-option:hover { border-color: #7c8cfb; background: #f7f8ff; }
        .delivery-option.selected { border-color: #7c8cfb; background: #f0f2ff; }
        .delivery-option-dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid #e0e0e0; flex-shrink: 0; transition: all 0.2s;
        }
        .delivery-option.selected .delivery-option-dot { border-color: #7c8cfb; background: #7c8cfb; }
        .delivery-option-label { font-size: 14px; font-weight: 700; flex: 1; }
        .delivery-option-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .opt-checking .delivery-option-badge { background: #fef3e2; color: #e67e22; border: 1px solid #fad7a0; }
        .opt-ready    .delivery-option-badge { background: #eaf4fb; color: #2e86c1; border: 1px solid #aed6f1; }
        .opt-ing      .delivery-option-badge { background: #e8f0fe; color: #4285f4; border: 1px solid #c5d8fd; }
        .opt-done     .delivery-option-badge { background: #f0f0f0; color: #888;    border: 1px solid #e0e0e0; }
        .btn-confirm {
            width: 100%; padding: 16px; font-size: 15px; font-weight: 800; color: #fff;
            background: linear-gradient(135deg, #7c8cfb, #5aa9ff);
            border: none; border-radius: 14px; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 16px rgba(124,140,251,0.3);
        }
        .btn-confirm:hover { transform: translateY(-2px); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<th:block layout:fragment="content">
    <div class="detail-wrapper">

        <a href="/business/order/history" class="back-btn">&larr; 주문 목록으로</a>
        <h2 class="page-title">주문 상세</h2>
        <p class="page-subtitle" th:text="${order.orderNo}">ORDER_...</p>

        <!-- 주문 정보 -->
        <div class="info-card">
            <div class="info-card-title">주문 정보</div>
            <div class="info-row">
                <span class="info-label">주문번호</span>
                <span class="info-value" th:text="${order.orderNo}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">고객명</span>
                <span class="info-value" th:text="${order.customerNickname}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">결제일시</span>
                <span class="info-value"
                      th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">거래 유형</span>
                <span class="info-value" th:text="${order.bidId != null} ? '개인거래' : 'Kit 구매'"></span>
            </div>
            <div class="info-row">
                <span class="info-label">결제상태</span>
                <span class="info-value paid">결제완료</span>
            </div>
            <div class="info-row" th:if="${order.bidId != null}">
                <span class="info-label">수락 상태</span>
                <span class="accept-badge accept-pending"  th:if="${order.acceptStatus == 'PENDING'}">검토중</span>
                <span class="accept-badge accept-accepted" th:if="${order.acceptStatus == 'ACCEPTED'}">수락됨</span>
                <span class="accept-badge accept-rejected" th:if="${order.acceptStatus == 'REJECTED'}">거절됨</span>
            </div>
            <div class="info-row">
                <span class="info-label">배송 상태</span>
                <span class="delivery-badge delivery-checking" th:if="${order.deliveryStatus == 1}">결제확인중</span>
                <span class="delivery-badge delivery-ready"    th:if="${order.deliveryStatus == 2}">배송준비</span>
                <span class="delivery-badge delivery-ing"      th:if="${order.deliveryStatus == 3}">배송중</span>
                <span class="delivery-badge delivery-done"     th:if="${order.deliveryStatus == 4}">배송완료</span>
                <span class="delivery-badge delivery-cancel"   th:if="${order.deliveryStatus == 9}">취소</span>
            </div>
            <div class="info-row">
                <span class="info-label">결제금액</span>
                <span class="info-value"
                      th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}"></span>
            </div>
            <div class="info-row" th:if="${order.bidId != null and order.dueDate != null}">
                <span class="info-label">예상 완료일</span>
                <span class="info-value"
                      th:text="${#temporals.format(order.dueDate, 'yyyy-MM-dd')}"></span>
            </div>

            <th:block th:if="${order.deliveryStatus != 9 and order.acceptStatus != 'REJECTED'}">
                <div class="delivery-tracker">
                    <div th:class="${order.deliveryStatus == 1} ? 'tracker-step current'
                                 : (${order.deliveryStatus > 1} ? 'tracker-step active' : 'tracker-step')">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">결제확인중</div>
                    </div>
                    <div th:class="${order.deliveryStatus == 2} ? 'tracker-step current'
                                 : (${order.deliveryStatus > 2} ? 'tracker-step active' : 'tracker-step')">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">배송준비</div>
                    </div>
                    <div th:class="${order.deliveryStatus == 3} ? 'tracker-step current'
                                 : (${order.deliveryStatus > 3} ? 'tracker-step active' : 'tracker-step')">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">배송중</div>
                    </div>
                    <div th:class="${order.deliveryStatus == 4} ? 'tracker-step current active' : 'tracker-step'">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">배송완료</div>
                    </div>
                </div>
            </th:block>

            <th:block th:if="${order.deliveryStatus == 9 or order.acceptStatus == 'REJECTED'}">
                <div style="margin-top: 16px;">
                    <span class="delivery-badge delivery-cancel">이 주문은 취소되었습니다.</span>
                </div>
            </th:block>
        </div>

        <!-- 주문 상품 -->
        <div class="info-card">
            <div class="info-card-title">주문 상품</div>

            <!-- ✅ 이미지 없을 경우 기본 이미지 적용 -->
            <div th:each="item : ${order.items}" class="order-item-row">

                <a th:href="${order.bidId != null}
                           ? '/business/request/detail/' + ${order.requestId}
                           : '/customer/shop/detail?id=' + ${item.kitId}"
                   style="text-decoration:none; flex-shrink:0; display:block;">
                    <img class="item-img"
                         th:src="${item.imageUrl != null ? item.imageUrl : '/image/default-profile.png'}"
                         onerror="this.src='/image/default-profile.png'"
                         th:alt="${item.productName}">
                </a>

                <div class="item-info">
                    <a th:href="${order.bidId != null}
                               ? '/business/request/detail/' + ${order.requestId}
                               : '/customer/shop/detail?id=' + ${item.kitId}"
                       style="text-decoration:none; color:inherit;">
                        <div class="item-name" th:text="${item.productName}">상품명</div>
                    </a>
                    <div class="item-qty" th:text="${item.quantity} + '개'">1개</div>
                </div>

                <div class="item-price"
                     th:text="${#numbers.formatInteger(item.price * item.quantity, 3, 'COMMA') + '원'}"></div>
            </div>

            <div class="total-row">
                <span class="total-label">총 결제 금액</span>
                <span class="total-value"
                      th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}"></span>
            </div>
        </div>
    </div>

    <!-- 배송 관리 모달 -->
    <div class="modal-overlay" id="deliveryModalOverlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeDeliveryModal()">&times;</button>
            <div class="modal-title">배송 관리</div>
            <div class="modal-subtitle">변경할 배송 상태를 선택하세요.</div>
            <div class="delivery-options">
                <div class="delivery-option opt-checking" data-value="1" onclick="selectDeliveryOption(this)">
                    <div class="delivery-option-dot"></div>
                    <span class="delivery-option-label">결제확인중</span>
                    <span class="delivery-option-badge">결제확인중</span>
                </div>
                <div class="delivery-option opt-ready" data-value="2" onclick="selectDeliveryOption(this)">
                    <div class="delivery-option-dot"></div>
                    <span class="delivery-option-label">배송준비</span>
                    <span class="delivery-option-badge">배송준비</span>
                </div>
                <div class="delivery-option opt-ing" data-value="3" onclick="selectDeliveryOption(this)">
                    <div class="delivery-option-dot"></div>
                    <span class="delivery-option-label">배송중</span>
                    <span class="delivery-option-badge">배송중</span>
                </div>
                <div class="delivery-option opt-done" data-value="4" onclick="selectDeliveryOption(this)">
                    <div class="delivery-option-dot"></div>
                    <span class="delivery-option-label">배송완료</span>
                    <span class="delivery-option-badge">배송완료</span>
                </div>
            </div>
            <button class="btn-confirm" onclick="confirmDelivery()">변경 저장</button>
        </div>
    </div>

    <script th:inline="javascript">
    /*<![CDATA[*/
        var _deliveryOrderId = null;
        var _selectedStatus  = null;

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('deliveryModalOverlay')
                .addEventListener('click', function(e) {
                    if (e.target === this) closeDeliveryModal();
                });
        });

        function openDeliveryModal(btn) {
            _deliveryOrderId = btn.dataset.orderId;
            _selectedStatus  = parseInt(btn.dataset.deliveryStatus);
            document.querySelectorAll('.delivery-option').forEach(function(el) {
                el.classList.toggle('selected', parseInt(el.dataset.value) === _selectedStatus);
            });
            document.getElementById('deliveryModalOverlay').classList.add('show');
        }

        function closeDeliveryModal() {
            document.getElementById('deliveryModalOverlay').classList.remove('show');
        }

        function selectDeliveryOption(el) {
            document.querySelectorAll('.delivery-option').forEach(function(opt) {
                opt.classList.remove('selected');
            });
            el.classList.add('selected');
            _selectedStatus = parseInt(el.dataset.value);
        }

        function confirmDelivery() {
            if (!_deliveryOrderId || _selectedStatus === null) return;
            fetch('/business/order/delivery/' + _deliveryOrderId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deliveryStatus: _selectedStatus })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) { closeDeliveryModal(); location.reload(); }
                else alert(data.message || '처리에 실패했습니다.');
            })
            .catch(function() { alert('오류가 발생했습니다.'); });
        }
    /*]]>*/
    </script>

</th:block>
</body>
</html>
