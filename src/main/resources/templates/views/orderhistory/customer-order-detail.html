<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
    <meta charset="UTF-8">
    <title>구매 상세 - Nextage</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: #fafafa; color: #333; }

        .detail-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: #bd93f9; font-weight: 600;
            text-decoration: none; margin-bottom: 24px;
            transition: gap 0.2s;
        }
        .back-btn:hover { gap: 10px; }

        .page-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px; font-weight: 900; color: #222; margin-bottom: 6px;
        }
        .page-subtitle { font-size: 14px; color: #aaa; margin-bottom: 32px; }

        .info-card {
            background: #fff;
            border: 1px solid #ebebeb;
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .info-card-title {
            font-size: 11px; font-weight: 700; color: #bbb;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 18px;
        }
        .info-row {
            display: flex; justify-content: space-between;
            font-size: 14px; margin-bottom: 12px; align-items: center;
        }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: #aaa; }
        .info-value { font-weight: 600; color: #333; }
        .info-value.paid { color: #bd93f9; font-weight: 700; }

        /* 배송 상태 뱃지 */
        .delivery-badge {
            font-size: 12px; font-weight: 700;
            padding: 4px 14px; border-radius: 20px;
            white-space: nowrap; display: inline-block;
        }
        .delivery-checking { background: #fef3e2; color: #e67e22; border: 1px solid #fad7a0; }
        .delivery-ready    { background: #eaf4fb; color: #2e86c1; border: 1px solid #aed6f1; }
        .delivery-ing      { background: #e8f0fe; color: #4285f4; border: 1px solid #c5d8fd; }
        .delivery-done     { background: #f0f0f0; color: #888;    border: 1px solid #e0e0e0; }
        .delivery-cancel   { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffc2c2; }

        /* 수락 상태 뱃지 */
        .accept-badge {
            font-size: 12px; font-weight: 700;
            padding: 4px 14px; border-radius: 20px;
            white-space: nowrap; display: inline-block;
        }
        .accept-pending  { background: #fff8e1; color: #f59e0b; border: 1px solid #fde68a; }
        .accept-accepted { background: #eefbf3; color: #2ecc71; border: 1px solid #a7f3d0; }
        .accept-rejected { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffc2c2; }

        /* 배송 단계 트래커 */
        .delivery-tracker {
            display: flex; align-items: center;
            margin: 20px 0 8px; gap: 0;
        }
        .tracker-step {
            display: flex; flex-direction: column; align-items: center;
            flex: 1; position: relative;
        }
        .tracker-step:not(:last-child)::after {
            content: '';
            position: absolute; top: 14px; left: 50%;
            width: 100%; height: 2px;
            background: #ebebeb; z-index: 0;
        }
        .tracker-step.active::after  { background: #bd93f9; }
        .tracker-dot {
            width: 28px; height: 28px; border-radius: 50%;
            background: #ebebeb; border: 2px solid #e0e0e0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; position: relative;
            transition: all 0.3s;
        }
        .tracker-step.active .tracker-dot {
            background: linear-gradient(135deg, #bd93f9, #a6c1ee);
            border-color: #bd93f9;
        }
        .tracker-step.current .tracker-dot {
            background: linear-gradient(135deg, #bd93f9, #a6c1ee);
            border-color: #bd93f9;
            box-shadow: 0 0 0 4px rgba(189,147,249,0.2);
        }
        .tracker-dot-inner {
            width: 8px; height: 8px; border-radius: 50%; background: #fff;
        }
        .tracker-label {
            font-size: 11px; font-weight: 600; color: #bbb;
            margin-top: 8px; text-align: center; white-space: nowrap;
        }
        .tracker-step.active .tracker-label,
        .tracker-step.current .tracker-label { color: #bd93f9; }
        .tracker-cancel .tracker-dot  { background: #ff6b6b; border-color: #ff6b6b; }
        .tracker-cancel .tracker-label { color: #ff6b6b; }

        .order-item-row {
            display: flex; align-items: center;
            gap: 16px; padding: 18px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .order-item-row:last-of-type { border-bottom: none; }

        .item-img {
            width: 72px; height: 72px; object-fit: cover;
            border-radius: 12px; border: 1px solid #eee; flex-shrink: 0;
        }
        .item-placeholder {
            width: 72px; height: 72px; border-radius: 12px;
            background: linear-gradient(135deg, #f5f0ff, #ede9fe);
            flex-shrink: 0;
        }
        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 15px; font-weight: 700; color: #222; margin-bottom: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-qty { font-size: 13px; color: #bbb; }
        .item-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 17px; font-weight: 900; color: #333;
            flex-shrink: 0; min-width: 90px; text-align: right;
        }

        .btn-review {
            padding: 9px 20px; font-size: 13px; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, #bd93f9, #a6c1ee);
            border: none; border-radius: 20px; cursor: pointer;
            transition: all 0.3s; flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(189,147,249,0.3); white-space: nowrap;
        }
        .btn-review:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(189,147,249,0.4); }

        .btn-reviewed {
            padding: 9px 20px; font-size: 13px; font-weight: 700; color: #ccc;
            background: #f5f5f5; border: none; border-radius: 20px;
            cursor: default; flex-shrink: 0; white-space: nowrap;
        }

        .total-row {
            display: flex; justify-content: space-between;
            align-items: center; padding-top: 20px;
            border-top: 1px solid #f0f0f0; margin-top: 4px;
        }
        .total-label { font-size: 16px; font-weight: 700; color: #333; }
        .total-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px; font-weight: 900;
            background: linear-gradient(to right, #a78bfa, #a6c1ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .delete-area {
            background: #f5f5f5;
            border: 1px solid #ebebeb;
            border-radius: 16px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-area-text { font-size: 13px; color: #bbb; }
        .btn-delete-order {
            padding: 9px 20px;
            font-size: 13px; font-weight: 700; color: #ff6b6b;
            background: #fff5f5;
            border: 1.5px solid #ffc2c2;
            border-radius: 20px; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .btn-delete-order:hover {
            background: #ff6b6b; color: #fff;
            border-color: #ff6b6b;
        }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
            z-index: 10000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 24px; padding: 36px 32px;
            width: 440px; max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            position: relative; animation: slideUp 0.3s ease;
        }
        .modal-close {
            position: absolute; top: 16px; right: 20px;
            border: none; background: none;
            font-size: 22px; color: #ccc; cursor: pointer; transition: color 0.2s;
        }
        .modal-close:hover { color: #888; }
        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px; font-weight: 900; color: #222; margin-bottom: 4px;
        }
        .modal-subtitle { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .modal-product-name {
            font-size: 13px; font-weight: 700; color: #666;
            background: #f8f5ff; border-radius: 10px;
            padding: 10px 14px; margin-bottom: 20px;
        }
        .review-label { font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .review-textarea {
            width: 100%; height: 110px;
            border: 1.5px solid #ebebeb; border-radius: 12px;
            padding: 12px 14px; font-size: 14px; resize: none; outline: none;
            font-family: 'Pretendard', sans-serif; transition: border-color 0.2s; color: #333;
        }
        .review-textarea:focus { border-color: #bd93f9; }
        .btn-submit-review {
            width: 100%; padding: 16px; margin-top: 16px;
            font-size: 15px; font-weight: 800; color: #fff;
            background: linear-gradient(135deg, #bd93f9, #a6c1ee);
            border: none; border-radius: 14px; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 16px rgba(189,147,249,0.35);
        }
        .btn-submit-review:hover { transform: translateY(-2px); }
        .review-msg {
            text-align: center; margin-top: 12px;
            font-size: 13px; min-height: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<th:block layout:fragment="content">
    <div class="detail-wrapper">

        <a href="/customer/order/history" class="back-btn">&larr; 구매내역으로</a>

        <h2 class="page-title">구매 상세</h2>
        <p class="page-subtitle" th:text="${order.orderNo}">ORDER_...</p>

        <!-- 주문 정보 -->
        <div class="info-card">
            <div class="info-card-title">주문 정보</div>
            <div class="info-row">
                <span class="info-label">주문번호</span>
                <span class="info-value" th:text="${order.orderNo}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">결제일시</span>
                <span class="info-value"
                      th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">결제상태</span>
                <span class="info-value paid">결제완료</span>
            </div>

            <!-- 개인거래일 때만 업체 수락 상태 표시 -->
            <div class="info-row" th:if="${order.bidId != null}">
                <span class="info-label">업체 수락 상태</span>
                <span class="accept-badge accept-pending"
                      th:if="${order.acceptStatus == 'PENDING'}">검토중</span>
                <span class="accept-badge accept-accepted"
                      th:if="${order.acceptStatus == 'ACCEPTED'}">수락됨</span>
                <span class="accept-badge accept-rejected"
                      th:if="${order.acceptStatus == 'REJECTED'}">거절됨</span>
            </div>

            <div class="info-row">
                <span class="info-label">배송 상태</span>
                <span class="delivery-badge delivery-checking"
                      th:if="${order.deliveryStatus == 1}">결제확인중</span>
                <span class="delivery-badge delivery-ready"
                      th:if="${order.deliveryStatus == 2}">배송준비</span>
                <span class="delivery-badge delivery-ing"
                      th:if="${order.deliveryStatus == 3}">배송중</span>
                <span class="delivery-badge delivery-done"
                      th:if="${order.deliveryStatus == 4}">배송완료</span>
                <span class="delivery-badge delivery-cancel"
                      th:if="${order.deliveryStatus == 9}">취소</span>
            </div>

            <div class="info-row">
                <span class="info-label">결제금액</span>
                <span class="info-value"
                      th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}"></span>
            </div>

            <!-- 배송 단계 트래커 (취소가 아닐 때만) -->
            <th:block th:if="${order.deliveryStatus != 9}">
                <div class="delivery-tracker">

                    <div class="tracker-step"
                         th:classappend="${order.deliveryStatus >= 1} ? ' active' : ''"
                         th:class="${order.deliveryStatus == 1} ? 'tracker-step current' : 'tracker-step'">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">결제확인중</div>
                    </div>

                    <div class="tracker-step"
                         th:class="${order.deliveryStatus == 2} ? 'tracker-step current'
                                 : (${order.deliveryStatus > 2} ? 'tracker-step active'
                                 : 'tracker-step')">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">배송준비</div>
                    </div>

                    <div class="tracker-step"
                         th:class="${order.deliveryStatus == 3} ? 'tracker-step current'
                                 : (${order.deliveryStatus > 3} ? 'tracker-step active'
                                 : 'tracker-step')">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">배송중</div>
                    </div>

                    <div class="tracker-step"
                         th:class="${order.deliveryStatus == 4} ? 'tracker-step current active'
                                 : 'tracker-step'">
                        <div class="tracker-dot"><div class="tracker-dot-inner"></div></div>
                        <div class="tracker-label">배송완료</div>
                    </div>

                </div>
            </th:block>

            <!-- 취소일 때 -->
            <th:block th:if="${order.deliveryStatus == 9}">
                <div style="margin-top: 16px;">
                    <span class="delivery-badge delivery-cancel">이 주문은 취소되었습니다.</span>
                </div>
            </th:block>

        </div>

        <!-- 주문 상품 -->
        <div class="info-card">
            <div class="info-card-title">주문 상품</div>

            <div th:each="item : ${order.items}" class="order-item-row">
                <div class="item-placeholder"
                     th:if="${item.imageUrl == null}"></div>
                <img class="item-img"
                     th:if="${item.imageUrl != null}"
                     th:src="${item.imageUrl}"
                     th:alt="${item.productName}">

                <div class="item-info">
                    <div class="item-name" th:text="${item.productName}">상품명</div>
                    <div class="item-qty" th:text="${item.quantity} + '개'">1개</div>
                </div>

                <div class="item-price"
                     th:text="${#numbers.formatInteger(item.price * item.quantity, 3, 'COMMA') + '원'}">
                </div>

                <!-- 후기 버튼: 개인거래(bid_id 있음)일 때만 표시 -->
                <th:block th:if="${order.bidId != null and order.deliveryStatus == 4}">
				    <button class="btn-reviewed"
				            th:if="${item.reviewed}"
				            th:data-order-item-id="${item.orderItemId}"
				            th:data-product-name="${item.productName}"
				            onclick="openReviewReadModal(this)">후기 보기</button>
				    <button class="btn-review"
				            th:if="${!item.reviewed}"
				            th:data-order-item-id="${item.orderItemId}"
				            th:data-business-id="${item.businessId}"
				            th:data-product-name="${item.productName}"
				            onclick="openReviewModalFromBtn(this)">후기 작성</button>
				</th:block>
            </div>

            <div class="total-row">
                <span class="total-label">총 결제 금액</span>
                <span class="total-value"
                      th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}"></span>
            </div>
        </div>

        <!-- 구매내역 삭제 영역 -->
        <div class="delete-area">
            <span class="delete-area-text">해당 주문 내역을 삭제할 수 있습니다.</span>
            <button class="btn-delete-order"
                    th:data-order-id="${order.orderId}"
                    onclick="confirmDelete(this)">
                구매내역 삭제
            </button>
        </div>

    </div>

    <!-- 후기 작성 모달 -->
    <div class="modal-overlay" id="reviewModalOverlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeReviewModal()">&times;</button>
            <div class="modal-title">후기 작성</div>
            <div class="modal-subtitle">서비스는 어떠셨나요?</div>
            <div class="modal-product-name" id="reviewProductName"></div>
            <div class="review-label">후기 내용</div>
            <textarea class="review-textarea" id="reviewContent"
                      placeholder="서비스에 대한 솔직한 후기를 남겨주세요."></textarea>
            <button class="btn-submit-review" onclick="submitReview()">후기 등록</button>
            <div class="review-msg" id="reviewMsg"></div>
        </div>
    </div>
    
    <!-- 후기 보기 모달 -->
	<div class="modal-overlay" id="reviewReadModalOverlay">
	    <div class="modal-box">
	        <button class="modal-close" onclick="closeReviewReadModal()">&times;</button>
	        <div class="modal-title">내 후기</div>
	        <div class="modal-subtitle">작성한 후기 내용입니다.</div>
	        <div class="modal-product-name" id="readReviewProductName"></div>
	        <div class="review-label">후기 내용</div>
	        <div id="readReviewContent" style="
	            width:100%; min-height:110px;
	            border:1.5px solid #ebebeb; border-radius:12px;
	            padding:12px 14px; font-size:14px;
	            color:#333; background:#fafafa; line-height:1.6;
	            white-space:pre-wrap;">
	        </div>
	        <div id="readReviewDate" style="
	            text-align:right; font-size:12px;
	            color:#bbb; margin-top:10px;">
	        </div>
	    </div>
	</div>

    <script th:inline="javascript">
    /*<![CDATA[*/
        var _orderItemId = null;
        var _businessId  = null;

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('reviewModalOverlay')
                .addEventListener('click', function(e) {
                    if (e.target === this) closeReviewModal();
                });
        });

        function openReviewModalFromBtn(btn) {
            _orderItemId = btn.dataset.orderItemId;
            _businessId  = btn.dataset.businessId;
            document.getElementById('reviewProductName').textContent = btn.dataset.productName;
            document.getElementById('reviewContent').value           = '';
            document.getElementById('reviewMsg').textContent         = '';
            document.getElementById('reviewModalOverlay').classList.add('show');
        }

        function closeReviewModal() {
            document.getElementById('reviewModalOverlay').classList.remove('show');
        }

        function confirmDelete(btn) {
            if (!confirm('이 주문 내역을 삭제하시겠습니까?\n삭제된 내역은 복구되지 않습니다.')) return;

            var orderId = btn.dataset.orderId;

            fetch('/customer/order/delete/' + orderId, { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    location.href = '/customer/order/history';
                } else {
                    alert(data.message || '삭제에 실패했습니다.');
                }
            })
            .catch(function() { alert('오류가 발생했습니다.'); });
        }

        function submitReview() {
            var content = document.getElementById('reviewContent').value.trim();
            if (!content) {
                document.getElementById('reviewMsg').innerHTML =
                    '<span style="color:#ff6b6b;">후기 내용을 입력해주세요.</span>';
                return;
            }

            fetch('/customer/order/review', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({
                    orderItemId: _orderItemId,
                    businessId : _businessId,
                    content    : content
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    document.getElementById('reviewMsg').innerHTML =
                        '<span style="color:#6dca8a; font-weight:700;">후기가 등록되었습니다!</span>';
                    setTimeout(function() {
                        closeReviewModal();
                        location.reload();
                    }, 1200);
                } else {
                    document.getElementById('reviewMsg').innerHTML =
                        '<span style="color:#ff6b6b;">' + data.message + '</span>';
                }
            })
            .catch(function() {
                document.getElementById('reviewMsg').innerHTML =
                    '<span style="color:#ff6b6b;">오류가 발생했습니다.</span>';
            });
            
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('reviewModalOverlay')
                    .addEventListener('click', function(e) {
                        if (e.target === this) closeReviewModal();
                    });
                // 추가
                document.getElementById('reviewReadModalOverlay')
                    .addEventListener('click', function(e) {
                        if (e.target === this) closeReviewReadModal();
                    });
            });

            function openReviewReadModal(btn) {
                var orderItemId = btn.dataset.orderItemId;
                var productName = btn.dataset.productName;

                document.getElementById('readReviewProductName').textContent = productName;
                document.getElementById('readReviewContent').textContent     = '불러오는 중...';
                document.getElementById('readReviewDate').textContent        = '';
                document.getElementById('reviewReadModalOverlay').classList.add('show');

                fetch('/customer/order/review/' + orderItemId)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('readReviewContent').textContent = data.content;
                        document.getElementById('readReviewDate').textContent
                            = '작성일: ' + data.createdAt.substring(0, 10);
                    } else {
                        document.getElementById('readReviewContent').textContent = '후기를 불러올 수 없습니다.';
                    }
                })
                .catch(function() {
