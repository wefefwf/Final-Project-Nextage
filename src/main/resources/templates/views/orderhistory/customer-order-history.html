<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
    <meta charset="UTF-8">
    <title>구매내역 - Nextage</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: #fafafa; color: #333; }

        .history-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        .page-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px; font-weight: 900;
            color: #222; margin-bottom: 6px;
        }
        .page-subtitle { font-size: 14px; color: #aaa; margin-bottom: 36px; }

        .order-card-wrapper { margin-bottom: 16px; }

        .order-card {
            background: #fff;
            border: 1px solid #ebebeb;
            border-radius: 16px;
            padding: 24px 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .order-card:hover {
            border-color: #d8c4f8;
            box-shadow: 0 6px 20px rgba(189,147,249,0.12);
            transform: translateY(-2px);
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .order-product-name {
            font-size: 15px; font-weight: 700; color: #222; margin-bottom: 6px;
        }
        .order-no {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; font-weight: 700; color: #bd93f9; margin-bottom: 4px;
        }
        .order-date { font-size: 12px; color: #bbb; }

        .badge-group {
            display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
        }

        /* 결제 상태 뱃지 */
		.order-status {
		    font-size: 16px; font-weight: 700;
		    color: #bd93f9; white-space: nowrap;
		    display: inline-block;
		    margin-right: 10px;
		}

        /* 수락 상태 뱃지 */
        .accept-badge {
            font-size: 13px; font-weight: 700;
            padding: 7px 18px; border-radius: 20px;
            white-space: nowrap; display: inline-block;
        }
        .accept-pending  { background: #fff8e1; color: #f59e0b; border: 1px solid #fde68a; }
        .accept-accepted { background: #eefbf3; color: #2ecc71; border: 1px solid #a7f3d0; }
        .accept-rejected { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffc2c2; }

        /* 배송 상태 뱃지 */
        .delivery-badge {
            font-size: 13px; font-weight: 700;
            padding: 7px 18px; border-radius: 20px;
            white-space: nowrap; display: inline-block;
        }
        .delivery-checking { background: #fef3e2; color: #e67e22; border: 1px solid #fad7a0; }
        .delivery-ready    { background: #eaf4fb; color: #2e86c1; border: 1px solid #aed6f1; }
        .delivery-ing      { background: #e8f0fe; color: #4285f4; border: 1px solid #c5d8fd; }
        .delivery-done     { background: #f0f0f0; color: #888;    border: 1px solid #e0e0e0; }
        .delivery-cancel   { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffc2c2; }

        .order-items-preview {
            display: flex; gap: 10px;
            margin-bottom: 16px; flex-wrap: wrap;
        }

        .preview-img {
            width: 64px; height: 64px;
            object-fit: cover; border-radius: 10px; border: 1px solid #eee;
        }
        .preview-placeholder {
            width: 64px; height: 64px; border-radius: 10px;
            background: linear-gradient(135deg, #f5f0ff, #ede9fe);
        }
        .preview-more {
            width: 64px; height: 64px; border-radius: 10px;
            background: #f5f5f5;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #aaa;
        }

        .order-card-footer {
            display: flex; justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f5f5f5; padding-top: 14px;
        }

        .order-item-count { font-size: 13px; color: #999; }
        .order-total {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px; font-weight: 900;
            background: linear-gradient(to right, #a78bfa, #a6c1ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .detail-arrow { font-size: 13px; color: #bd93f9; font-weight: 600; }

        .empty-state { text-align: center; padding: 80px 0; color: #bbb; }
        .empty-text { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
        .btn-shop {
            display: inline-block; padding: 14px 32px;
            font-size: 14px; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, #bd93f9, #a6c1ee);
            border-radius: 50px; text-decoration: none;
            box-shadow: 0 4px 16px rgba(189,147,249,0.35); transition: all 0.3s;
        }
        .btn-shop:hover { transform: translateY(-2px); }

        .pagination {
            display: flex; justify-content: center;
            align-items: center; gap: 6px;
            margin-top: 36px;
        }
        .page-btn {
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 14px; font-weight: 600;
            text-decoration: none; color: #aaa;
            border: 1.5px solid #eee; background: #fff;
            transition: all 0.2s;
        }
        .page-btn:hover { border-color: #bd93f9; color: #bd93f9; }
        .page-btn.active {
            background: linear-gradient(135deg, #bd93f9, #a6c1ee);
            color: #fff; border-color: transparent;
            box-shadow: 0 2px 10px rgba(189,147,249,0.35);
        }
        .page-btn.disabled { opacity: 0.35; pointer-events: none; }
    </style>
</head>
<body>
<th:block layout:fragment="content">
    <div class="history-wrapper">

        <h2 class="page-title">구매내역</h2>
        <p class="page-subtitle">결제가 완료된 주문 내역을 확인하세요.</p>

        <!-- 빈 상태 -->
        <div class="empty-state" th:if="${#lists.isEmpty(orders)}">
            <div class="empty-text">구매 내역이 없어요.</div>
            <a href="/customer/shop" class="btn-shop">쇼핑하러 가기</a>
        </div>

        <!-- 주문 목록 -->
        <div th:each="order : ${orders}" class="order-card-wrapper">
            <a class="order-card"
               th:href="@{/order/detail/{orderId}(orderId=${order.orderId})}">

                <div class="order-card-header">
                    <div>
                        <div class="order-product-name">
                            <th:block th:if="${not #lists.isEmpty(order.items)}">
                                <span th:text="${order.items[0].productName}">상품명</span>
                                <span th:if="${#lists.size(order.items) > 1}"
                                      th:text="' 외 ' + (${#lists.size(order.items)} - 1) + '건'"></span>
                            </th:block>
                            <span th:if="${#lists.isEmpty(order.items)}"
                                  style="color:#ccc;">상품 정보 없음</span>
                        </div>
                        <div class="order-no" th:text="${order.orderNo}">ORDER_...</div>
                        <div class="order-date"
                             th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                    </div>

                    <!-- 뱃지 그룹 -->
                    <div class="badge-group">

                        <!-- 결제 완료 고정 뱃지 -->
                        <span class="order-status">결제완료</span>

                        <!-- 배송 상태: 1=결제확인중, 2=배송준비, 3=배송중, 4=배송완료, 9=취소 -->
                        <span class="delivery-badge delivery-checking"
                              th:if="${order.deliveryStatus == 1}">결제확인중</span>
                        <span class="delivery-badge delivery-ready"
                              th:if="${order.deliveryStatus == 2}">배송준비</span>
                        <span class="delivery-badge delivery-ing"
                              th:if="${order.deliveryStatus == 3}">배송중</span>
                        <span class="delivery-badge delivery-done"
                              th:if="${order.deliveryStatus == 4}">배송완료</span>
                        <span class="delivery-badge delivery-cancel"
                              th:if="${order.deliveryStatus == 9}">취소</span>

                        <!-- 개인거래(bid_id 있음)일 때만 업체 수락 상태 표시 -->
                        <th:block th:if="${order.bidId != null}">
                            <span class="accept-badge accept-pending"
                                  th:if="${order.acceptStatus == 'PENDING'}">검토중</span>
                            <span class="accept-badge accept-accepted"
                                  th:if="${order.acceptStatus == 'ACCEPTED'}">수락됨</span>
                            <span class="accept-badge accept-rejected"
                                  th:if="${order.acceptStatus == 'REJECTED'}">거절됨</span>
                        </th:block>

                    </div>
                </div>

                <div class="order-items-preview">
                    <th:block th:each="item, iter : ${order.items}" th:if="${iter.index < 4}">
                        <div class="preview-placeholder"
                             th:if="${item.imageUrl == null}"></div>
                        <img class="preview-img"
                             th:if="${item.imageUrl != null}"
                             th:src="${item.imageUrl}"
                             th:alt="${item.productName}">
                    </th:block>
                    <div class="preview-more"
                         th:if="${#lists.size(order.items) > 4}"
                         th:text="'+' + (${#lists.size(order.items)} - 4)"></div>
                </div>

                <div class="order-card-footer">
                    <span class="order-item-count"
                          th:text="${#lists.size(order.items)} + '개 상품'">1개 상품</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="order-total"
                              th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}">
                            0원
                        </span>
                        <span class="detail-arrow">상세 보러가기 &rarr;</span>
                    </div>
                </div>

            </a>
        </div>

        <!-- 페이징 -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-btn"
               th:classappend="${currentPage == 1} ? 'disabled'"
               th:href="@{/order/history(page=${currentPage - 1})}">&lsaquo;</a>

            <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a class="page-btn"
                   th:classappend="${i == currentPage} ? 'active'"
                   th:href="@{/order/history(page=${i})}"
                   th:text="${i}">1</a>
            </th:block>

            <a class="page-btn"
               th:classappend="${currentPage == totalPages} ? 'disabled'"
               th:href="@{/order/history(page=${currentPage + 1})}">&rsaquo;</a>
        </div>

    </div>
</th:block>
</body>
</html>
