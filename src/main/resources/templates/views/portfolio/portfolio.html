<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="${isMine ? 'layouts/business-layout' : 'layouts/customer-layout'}">
<head>
    <meta charset="UTF-8">
    <title>Nextage Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <link rel="stylesheet" th:href="@{/css/portfolio/portfolio.css}" />
    <style>
        .slick-dots { bottom: -30px !important; }
        .modal-slider { margin-bottom: 30px !important; }
        .is-hidden { opacity: 0.6; filter: grayscale(50%); }
        .slick-prev, .slick-next { display: none !important; }
        .square-img { width: 100% !important; aspect-ratio: 1/1 !important; object-fit: cover !important; border-radius: 20px !important; }
        .empty-text { color: #bbb; font-style: italic; }
        .work-period { font-size: 13px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<th:block layout:fragment="content">
    <div class="portfolio-content">
        <div class="top-row">
           <div class="profile-section">
           <!-- мқҙлҜём§Җ -->
		    <h2 class="section-title">н”„лЎңн•„</h2>
		    <div class="profile-image-container">
			    <img th:src="${(bizinfo != null && bizinfo.profileImage != null) ? bizinfo.profileImage : '/images/default-profile.png'}" 
			         alt="н”„лЎңн•„"
			         class="square-img">
			</div>
		    <div class="profile-btns" th:if="${isMine}">
		    <input type="file" id="profileInput" style="display: none;" accept="image/*" onchange="uploadProfileImage(this)">
			    <button type="button"
			            class="btn-modify" onclick="document.getElementById('profileInput').click()"
			            th:text="${bizinfo?.profileImage != null ? 'н”„лЎңн•„ мҲҳм •' : 'н”„лЎңн•„ м¶”к°Җ'}">
			    </button>
			    <button type="button"
			            class="btn-delete"
			            style="background: #333; color: #fff;"
			            th:if="${bizinfo?.profileImage != null}" onclick="deleteItem('profile')">
			        н”„лЎңн•„ мӮӯм ң
			    </button>
			</div>
		    <!--  customerлҠ” мқҙлҰ„мңјлЎң ліҙмқҙкІҢ-->
		    <div class="company-name-box" th:if="${!isMine}">
			    <strong th:text="${bizinfo?.companyName}">л„ҘмҠӨн…Ңмқҙм§Җ мҲҳм„ мҶҢ</strong>
			</div>
		</div>
			<!-- мң„м№ҳ -->
            <div class="info-section">
                <div class="location-group">
                    <h2 class="section-title">мң„м№ҳ</h2>
                    <div class="info-box">
                        <span th:text="${bizinfo?.location != null ? bizinfo.location : 'л“ұлЎқлҗң мң„м№ҳ м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.'}"
                              th:classappend="${bizinfo?.location == null ? 'empty-text' : ''}"></span>
                        <div class="box-actions" th:if="${isMine}">
                            <button type="button" th:text="${bizinfo?.location != null ? 'мҲҳм •' : 'м¶”к°Җ'}"  onclick="editLocation(this)"></button>
                            <button type="button" onclick="deleteItem('location')">мӮӯм ң</button>
                        </div>
                    </div>
                </div>
				<!-- кІҪл Ҙ -->
                <div class="career-group">
                    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px;">
                        <h2 class="section-title" style="margin-bottom: 0;">кІҪл Ҙ</h2>
                        <button type="button" class="btn-add-career" th:if="${isMine and #lists.size(careerList) < 3}">+ кІҪл Ҙ м¶”к°Җ</button>
                    </div>
                    <div class="career-container">
                        <div class="info-box career-item" th:each="career : ${careerList}">
                            <span th:text="${career.workDescription}"></span>
                            <div class="box-actions" th:if="${isMine}">
                                <button type="button"  th:onclick="|editCareer(this, ${career.careerId})|">мҲҳм •</button>
                                <button type="button" th:onclick="|deleteItem('career', ${career.careerId})|">мӮӯм ң</button>
                            </div>
                        </div>
                        <div class="info-box empty-box" th:if="${#lists.isEmpty(careerList)}">
                            <span class="empty-text">л“ұлЎқлҗң кІҪл Ҙ мӮ¬н•ӯмқҙ м—ҶмҠөлӢҲлӢӨ.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
		<!-- reviewлңЁлҠ” л¶Җл¶„ -->
        <div class="work-section">
		    <h2 class="section-title">мһ‘м—… нҸ¬нҠёнҸҙлҰ¬мҳӨ</h2>
		
		    <!-- нҸ¬нҠёнҸҙлҰ¬мҳӨ мһҲмқҢ -->
		    <div class="work-grid" th:if="${!#lists.isEmpty(reviewList)}">
		        <th:block th:each="review : ${reviewList}">
		            <div class="work-card" 
		                 th:if="${isMine or review.status == 'ACTIVE'}"
		                 th:classappend="${review.status == 'HIDDEN' ? 'is-hidden' : ''}"
		                 data-bs-toggle="modal" data-bs-target="#workModal" 
		                 th:onclick="fillModal(this)"
		                 th:data-id="${review.reviewId}"
		                 th:data-status="${review.status}">
		                 
		                <div class="card-img-holder">
		                    <img th:src="${review.image1}">
		                </div>
		
		                <div class="card-footer">
		                    <div class="footer-top">
		                        <p class="order-num" th:text="'No. ' + ${review.orderNo}"></p>
		                        <h3 class="card-text" th:text="${review.requestTitle}"></h3>
		                    </div>
		
		                    <div class="footer-bottom">
		                        <p class="work-period">
		                            <span th:text="${#temporals.format(review.startDate, 'yyyy.MM.dd')}"></span> ~ 
		                            <span th:text="${#temporals.format(review.endDate, 'yyyy.MM.dd')}"></span>
		                        </p>
		                    </div>
		                </div>
		
		                <input type="hidden" class="h-content" th:value="${review.content}">
		                <input type="hidden" class="h-img2" th:value="${review.image2}">
		                <input type="hidden" class="h-img3" th:value="${review.image3}">
		            </div>
		        </th:block>
		    </div>
			<!-- нҺҳмқҙм§Җл„ӨмқҙмғЁ -->
			<div class="pagination-box" th:if="${totalPages > 0}">
			    
			    <a th:if="${startPage > 0}"
			       th:href="${isMine} ? @{/business/my-portfolio(page=${startPage - 1})} 
			                          : @{/business/portfolio/{id}(id=${bizinfo.businessId}, page=${startPage - 1})}"
			       class="page-btn nav-btn">
			       <i class="bi bi-caret-left"></i>
			    </a>
			
			    <th:block th:each="num : ${#numbers.sequence(startPage, endPage)}">
			        <a th:href="${isMine} ? @{/business/my-portfolio(page=${num})} 
			                              : @{/business/portfolio/{id}(id=${bizinfo.businessId}, page=${num})}"
			           class="page-btn"
			           th:classappend="${num == page} ? 'active' : ''"
			           th:text="${num + 1}">
			        </a>
			    </th:block>
			
			    <a th:if="${endPage < totalPages - 1}"
			       th:href="${isMine} ? @{/business/my-portfolio(page=${endPage + 1})} 
			                          : @{/business/portfolio/{id}(id=${bizinfo.businessId}, page=${endPage + 1})}"
			       class="page-btn nav-btn">
			       <i class="bi bi-caret-right"></i>
			    </a>
			</div>
		    <!-- нҸ¬нҠёнҸҙлҰ¬мҳӨ м—ҶмқҢ -->
		    <div class="empty-portfolio-box" th:if="${#lists.isEmpty(reviewList)}">
		
		        <!-- кі к°қ -->
		        <div th:if="${!isMine}" class="empty-text-box">
		            м•„м§Ғ нҸ¬нҠёнҸҙлҰ¬мҳӨк°Җ м—ҶмҠөлӢҲлӢӨ!
		        </div>
		
		        <!-- ліёмқё -->
		        <div th:if="${isMine}" class="empty-text-box">
		            <p>м•„м§Ғ нҸ¬нҠёнҸҙлҰ¬мҳӨк°Җ м—Ҷл„Өмҡ”!</p>
		            <p style="margin-bottom:20px;">"м ңм•Ҳ"н•ҳлҹ¬ к°Ҳк№Ңмҡ”?</p>
		
		            <a th:href="@{/business/request/list}" class="btn-go-list">
		                лҰ¬мҠӨнҠё ліҙлҹ¬к°Җкё°
		            </a>
		        </div>
		
		    </div>
		
		</div>
		<!--  лӘЁлӢ¬ -->
        <div class="modal fade" id="workModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content" style="border-radius: 35px; border: none;">
                    <div class="modal-header" style="padding: 35px 40px 20px; border: none; position: relative;">
                        <h1 class="modal-title" id="modalTitle" style="text-align: center; width: 100%; font-size: 20px;">мһ‘м—…л¬ј мғҒм„ё</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="position: absolute; right: 30px;"></button>
                    </div>
                    <div class="modal-body" style="padding: 0 40px 40px;">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="modal-slider">
								    <div class="slide-item"><img id="mImg1" src="" class="square-img"></div>
								    <div class="slide-item"><img id="mImg2" src="" class="square-img"></div>
								    <div class="slide-item"><img id="mImg3" src="" class="square-img"></div>
								</div>
                            </div>
                            <div class="col-md-6 d-flex flex-column" style="justify-content: space-between;">
                                <div class="modal-info-content">
                                    <p id="mOrderNum" style="color:#999; font-size:12px; margin-bottom: 2px;"></p>
                                    <p id="mPeriod" style="color:#888; font-size:13px; margin-bottom:15px;"></p>
                                    <h5 class="detail-label" style="font-weight: 600; margin-bottom: 8px;">мһ‘м—… л°Ҹ нӣ„кё° лӮҙмҡ©</h5>
                                    <p id="mReview" class="detail-text" style="white-space: pre-wrap; background: #f9f9f9; padding: 15px; border-radius: 12px;"></p>
                                </div>
                                <div class="modal-actions" th:if="${isMine}" style="margin-top: 30px; display: flex; justify-content: flex-end;">
                                    <button type="button" id="btnToggleStatus" onclick="toggleStatus()" style="padding: 10px 20px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-weight: 500;"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script th:src="@{/js/portfolio/portfolio.js}"></script>
</th:block>
</body>
</html>
