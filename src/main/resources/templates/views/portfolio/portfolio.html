<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="${isMine ? 'layouts/business-layout' : 'layouts/customer-layout'}">
<head>
    <meta charset="UTF-8">
    <title>Nextage Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <link rel="stylesheet" th:href="@{/css/portfolio/portfolio.css}" />
    
    <style>
        .slick-dots { bottom: -30px !important; }
        .modal-slider { margin-bottom: 30px !important; }
        /* 숨김 상태일 때 카드 스타일 (흐리게 처리) */
        .is-hidden { opacity: 0.6; filter: grayscale(50%); }
        .slick-prev, .slick-next { display: none !important; }
        .square-img { width: 100% !important; aspect-ratio: 1/1 !important; object-fit: cover !important; border-radius: 20px !important; }
    </style>
</head>
<body>
<th:block layout:fragment="content">
	<div class="portfolio-content">
	    <div class="top-row">
	        <div class="profile-section">
	            <h2 class="section-title">프로필</h2>
	            <div class="profile-image-container">
	                <img th:src="${bizinfo?.profileImage != null ? bizinfo.profileImage : '/images/default-profile.png'}" alt="프로필">
	            </div>
	            <div class="profile-btns" th:if="${isMine}">
	                <button type="button" class="btn-modify" 
	                        th:text="${bizinfo?.profileImage != null ? '이미지 수정' : '프로필 등록'}"></button>
	            </div>
	        </div>
	
	        <div class="info-section">
	            <div class="location-group">
	                <h2 class="section-title">위치</h2>
	                <div class="info-box">
	                    <span th:text="${bizinfo?.location != null ? bizinfo.location : '등록된 위치 정보가 없습니다.'}"
	                          th:style="${bizinfo?.location == null ? 'color: #bbb;' : ''}"></span>
	                    
	                    <div class="box-actions" th:if="${isMine}">
	                        <button type="button" th:text="${bizinfo?.location != null ? '수정' : '위치 등록'}"></button>
	                    </div>
	                </div>
	            </div>
	
	            <div class="career-group">
	                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px;">
	                    <h2 class="section-title" style="margin-bottom: 0;">경력</h2>
	                    <button type="button" class="btn-add-career" th:if="${isMine and #lists.size(careerList) < 3}">+ 경력 추가</button>
	                </div>
	                <div class="career-container">
	                    <div class="info-box career-item" th:each="career : ${careerList}">
	                        <span th:text="${career.workDescription}"></span>
	                        <div class="box-actions" th:if="${isMine}">
	                            <button type="button">삭제</button>
	                        </div>
	                    </div>
	                    
	                    <div class="info-box empty-box" th:if="${#lists.isEmpty(careerList)}">
	                        <span style="color: #bbb;">등록된 경력 사항이 없습니다. (최대 3개 등록 가능)</span>
	                    </div>
	                </div>
	            </div>
	        </div>
	    </div>
	
	    <div class="work-section">
	        <h2 class="section-title">작업 포트폴리오</h2>
	        
	        <div th:if="${#lists.isEmpty(reviewList)}" style="text-align: center; padding: 50px; background: #fff; border-radius: 20px; border: 1px solid #eee;">
	            <p style="color: #bbb; margin-bottom: 0;">아직 등록된 포트폴리오가 없습니다.</p>
	        </div>
	
	        <div class="work-grid" th:if="${!#lists.isEmpty(reviewList)}">
	            <th:block th:each="review : ${reviewList}">
	                <div class="work-card" 
	                     th:if="${isMine or review.status == 'ACTIVE'}"
	                     th:classappend="${review.status == 'HIDDEN' ? 'is-hidden' : ''}"
	                     data-bs-toggle="modal" data-bs-target="#workModal" 
	                     th:onclick="fillModal(this)">
	                    
	                    <div class="card-img-holder">
	                        <img th:src="${review.image1}">
	                    </div>
	                    <div class="card-footer">
	                        <div class="footer-top">
	                            <p class="order-num" th:text="'No. ' + ${review.orderNo}"></p>
	                            <h3 class="card-text" th:text="${review.requestTitle}"></h3>
	                        </div>
	                        <div class="footer-bottom">
	                            <p class="work-period">
	                                <span th:text="${#temporals.format(review.startDate, 'yyyy.MM.dd')}"></span> ~ 
	                                <span th:text="${#temporals.format(review.endDate, 'yyyy.MM.dd')}"></span>
	                            </p>
	                        </div>
	                    </div>
	                    <input type="hidden" class="h-content" th:value="${review.content}">
	                    <input type="hidden" class="h-img2" th:value="${review.image2}">
	                    <input type="hidden" class="h-img3" th:value="${review.image3}">
	                </div>
	            </th:block>
	        </div>
	    </div>
	</div>
	
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
	<script th:inline="javascript">
	// 로직은 싹 빼고 모달 띄우는 용도의 fillModal 함수만 남겨두었습니다.
	function fillModal(element) {
	    const img1 = element.querySelector('img').src;
	    const img2 = element.querySelector('.h-img2').value;
	    const img3 = element.querySelector('.h-img3').value;
	    const title = element.querySelector('.card-text').innerText;
	    const orderNum = element.querySelector('.order-num').innerText;
	    const period = element.querySelector('.work-period').innerText;
	    const content = element.querySelector('.h-content').value;
	
	    document.getElementById('modalTitle').innerText = title;
	    document.getElementById('mOrderNum').innerText = orderNum;
	    document.getElementById('mPeriod').innerText = period;
	    document.getElementById('mReview').innerText = content;
	
	    const slider = $('.modal-slider');
	    if (slider.hasClass('slick-initialized')) { slider.slick('unslick'); }
	
	    $('#mImg1').attr('src', img1);
	    
	    // 서브 이미지 유무에 따른 노출 처리
	    if(img2 && img2 !== 'null' && img2 !== '') { $('#mImg2').attr('src', img2).parent().show(); } 
	    else { $('#mImg2').parent().hide(); }
	    
	    if(img3 && img3 !== 'null' && img3 !== '') { $('#mImg3').attr('src', img3).parent().show(); } 
	    else { $('#mImg3').parent().hide(); }
	
	    $('#workModal').off('shown.bs.modal').on('shown.bs.modal', function () {
	        slider.slick({ dots: true, arrows: false, infinite: false, slidesToShow: 1, adaptiveHeight: true });
	    });
	}
	</script>
	</th:block>
</body>
</html>
