<div th:fragment="bidCommentsFragment" id="bid-comments-wrapper"
	class="bid-comments-container">
	<link rel="stylesheet"
		th:href="@{/css/customerRequest/customerRequestDetailBids.css}" />

	<!-- 업체 제안 등록 폼 -->
	<div id="bid-create-section" class="bid-create-section d-none">
		<div class="bid-create-card">
			<div class="bid-create-header">
				<h3 class="bid-create-title">이 의뢰에 제안하기</h3>
				<p class="bid-create-subtitle">작업 가능 조건과 금액을 입력해 제안을 등록하세요.</p>
			</div>

			<div class="bid-create-form">
				<div class="bid-create-form-group full">
					<label for="bid-create-description">제안 설명</label>
					<textarea id="bid-create-description" class="bid-create-textarea"
						rows="4" placeholder="예: 수선 방법, 작업 가능 범위, 참고사항 등을 입력해주세요."></textarea>
				</div>

				<div class="bid-create-form-grid">
					<div class="bid-create-form-group">
						<label for="bid-create-price">제안 가격</label> <input type="number"
							id="bid-create-price" class="bid-create-input"
							placeholder="예: 200000" min="0" />
					</div>

					<div class="bid-create-form-group">
						<label for="bid-create-due-date">예상 완료일</label> <input type="date"
							id="bid-create-due-date" class="bid-create-input" />
					</div>

					<div class="bid-create-form-group">
						<label for="bid-create-as-available">A/S 여부</label> <select
							id="bid-create-as-available" class="bid-create-select">
							<option value="">선택해주세요</option>
							<option value="true">가능</option>
							<option value="false">불가</option>
						</select>
					</div>
				</div>

				<div class="bid-create-actions">
					<button type="button" id="btn-submit-bid-create"
						class="btn-submit-bid-create">제안 등록하기</button>
				</div>
			</div>
		</div>
	</div>

	<div class="bid-section-header">
		<h3 class="section-title">
			전문가 제안 현황 <span id="bid-count-display" class="bid-count">0</span>
		</h3>

		<div class="bid-top-actions">
			<div class="bid-sort-dropdown" id="bid-sort-dropdown">
				<button class="bid-sort-button dropdown-toggle" id="bid-sort-button">
					가격 높은순</button>
				<div class="bid-sort-menu" id="bid-sort-menu">
					<div class="sort-option" data-sort="priceDesc">가격 높은순</div>
					<div class="menu-divider"></div>
					<div class="sort-option" data-sort="priceAsc">가격 낮은순</div>
					<div class="menu-divider"></div>
					<div class="sort-option" data-sort="latest">최신순</div>
					<div class="menu-divider"></div>
					<div class="sort-option" data-sort="oldest">오래된순</div>
				</div>
			</div>

			<button type="button" id="btn-clear-compare"
				class="btn-clear-compare d-none">선택해제</button>

			<button type="button" id="btn-open-compare"
				class="btn-compare d-none">비교하기</button>
		</div>
	</div>

	<!-- JS가 여기에 bid-item 생성 -->
	<div id="bid-list-container" class="bid-list"></div>

	<!-- 입찰 없을 때 -->
	<div id="bid-empty-message" class="bid-empty d-none">
		<div class="empty-icon">✉️</div>
		<p>아직 도착한 제안이 없습니다.</p>
	</div>

	<!-- 비교 모달 -->
	<div id="compare-modal" class="compare-modal hidden">
		<div class="compare-modal-backdrop"></div>

		<div class="compare-modal-panel">
			<div class="compare-modal-header">
				<h4>업체 제안 비교</h4>
				<button type="button" id="btn-close-compare"
					class="compare-close-btn">✕</button>
			</div>

			<div id="compare-modal-body" class="compare-modal-body"></div>
		</div>
	</div>

	<!-- 선정 / 결제 시작 모달 -->
	<div id="select-bid-modal" class="select-bid-modal hidden">
		<div class="select-bid-modal-backdrop"></div>

		<div class="select-bid-modal-panel">
			<div class="select-bid-modal-header">
				<h4>업체 선택</h4>
				<button type="button" id="btn-close-select-bid-modal"
					class="select-bid-close-btn">✕</button>
			</div>

			<div class="select-bid-modal-body">
				<div class="select-summary-card">
					<div class="select-summary-row">
						<span class="select-label">업체명</span> <span class="select-value"
							id="select-modal-vendor-name">-</span>
					</div>

					<div class="select-summary-row">
						<span class="select-label">제안일</span> <span class="select-value"
							id="select-modal-created-at">-</span>
					</div>

					<div class="select-summary-row">
						<span class="select-label">제안 가격</span> <span class="select-value"
							id="select-modal-price">-</span>
					</div>

					<div class="select-summary-row">
						<span class="select-label">예상 완료일</span> <span
							class="select-value" id="select-modal-due-date">-</span>
					</div>

					<div class="select-summary-row">
						<span class="select-label">A/S 여부</span> <span
							class="select-value" id="select-modal-as-available">-</span>
					</div>
				</div>

				<!-- START: 상세정보 -->
				<div class="select-stepper">
					<div class="select-step-indicator">
						<div class="step-dot active" data-step="1">1</div>
						<div class="step-line"></div>
						<div class="step-dot" data-step="2">2</div>
						<div class="step-line"></div>
						<div class="step-dot" data-step="3">3</div>
						<div class="step-line"></div>
						<div class="step-dot" data-step="4">4</div>
					</div>

					<div class="select-step-titles">
						<span class="step-title active" data-step-title="1">치수 입력</span> <span
							class="step-title" data-step-title="2">배송지 입력</span> <span
							class="step-title" data-step-title="3">요청사항</span> <span
							class="step-title" data-step-title="4">동의 및 결제</span>
					</div>
				</div>

				<div class="select-step-panels">
					<!-- STEP 1 -->
					<div class="select-step-panel active" data-step-panel="1">
						<div class="select-form-group">
							<label for="select-modal-size">치수 입력</label>
							<textarea id="select-modal-size" class="select-textarea" rows="6"
								placeholder="예: 총장 68cm / 어깨 45cm / 허리 29인치"></textarea>
						</div>
					</div>

					<!-- STEP 2 -->
					<div class="select-step-panel" data-step-panel="2">
						<div class="select-form-group">
							<label for="select-modal-address">배송지 입력</label>
							<textarea id="select-modal-address" class="select-textarea"
								rows="6"
								placeholder="예: 서울시 강남구 ○○로 00, 101동 101호 / 수령인 홍길동 / 010-1234-5678"></textarea>
						</div>
					</div>

					<!-- STEP 3 -->
					<div class="select-step-panel" data-step-panel="3">
						<div class="select-form-group">
							<label for="select-modal-request">추가 요청사항</label>
							<textarea id="select-modal-request" class="select-textarea"
								rows="6" placeholder="예: 소매는 조금만 줄여주세요. 원단 손상 없이 부탁드립니다."></textarea>
						</div>
					</div>

					<!-- STEP 4 -->
					<div class="select-step-panel" data-step-panel="4">
						<div class="select-confirm-box">
							<div class="select-confirm-row">
								<span class="confirm-label">치수</span>
								<div class="confirm-value" id="confirm-size">-</div>
							</div>
							<div class="select-confirm-row">
								<span class="confirm-label">배송지</span>
								<div class="confirm-value" id="confirm-address">-</div>
							</div>
							<div class="select-confirm-row">
								<span class="confirm-label">요청사항</span>
								<div class="confirm-value" id="confirm-request">-</div>
							</div>
						</div>

						<div class="select-agree-row">
							<label class="select-agree-label"> <input type="checkbox"
								id="select-modal-agree" /> 약관에 동의합니다.
							</label>
						</div>
					</div>
				</div>

				<div class="select-modal-actions step-actions">
					<button type="button" id="btn-prev-select-step"
						class="btn-step-secondary">이전</button>
					<button type="button" id="btn-next-select-step"
						class="btn-step-primary">다음</button>
					<button type="button" id="btn-submit-select-bid"
						class="btn-submit-select-bid d-none">결제 버튼</button>
				</div>
				<!-- END: 상세정보 -->
			</div>
		</div>
	</div>

	<script th:src="@{/js/customerRequest/customerRequestDetailBids.js}"></script>
	<script th:inline="javascript">
		document.addEventListener('DOMContentLoaded', function () {
	 		// 테스트용
	 		const requestId = /*[[${request.requestId}]]*/ null;	// 의뢰글 ID
			const isLoggedIn = true;	// 로그인 여부
			const isBusinessUser = true;	// 로그인 한 유저 판단: true가 업체
			const currentBusinessId = 2;	// 로그인한 업체 ID
				
				initBidSection({
						requestId,
						isLoggedIn,
						isBusinessUser,
						currentBusinessId
				});
		
		});
	</script>
</div>
