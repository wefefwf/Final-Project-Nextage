<div th:fragment="bidCommentsFragment" id="bid-comments-wrapper" class="bid-comments-container">
    <link rel="stylesheet" th:href="@{/css/customerRequest/customerRequestDetailBids.css}" />
	<h3 class="section-title">
		전문가 제안 현황 
		<span id="bid-count-display" class="bid-count">0</span>
	</h3>

	<!-- JS가 여기에 bid-item을 생성 -->
	<div id="bid-list-container" class="bid-list"></div>

	<!-- 입찰 없을 때 메시지 -->
	<div id="bid-empty-message" class="bid-empty">
		<div class="empty-icon">✉️</div>
		<p>아직 도착한 제안이 없습니다.</p>
	</div>


	<script th:inline="javascript">
		document.addEventListener('DOMContentLoaded', function() {
			const requestId = /*[[${request.requestId}]]*/ null;

			if (requestId) {
				refreshBidList(requestId);
			}
		});
	</script>
	<script th:src="@{/js/customerRequest/customerRequestDetailBids.js}"></script>
</div>
