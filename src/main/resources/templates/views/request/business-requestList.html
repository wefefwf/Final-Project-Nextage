<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">
<head>
    <meta charset="UTF-8">
    <title>Nextage | 의뢰 목록</title>
    <link rel="stylesheet" th:href="@{/css/businessRequest/business-requestList.css}" />
</head>
<body>
<th:block layout:fragment="content">
    <div class="request-board-container">

        <div class="board-header">
    <div class="header-left">
        <div class="category-filters">
            <button class="filter-btn active" data-category="all">전체</button>
            
            <div class="filter-group">
                <span class="group-label">Clothes</span>
                <button class="filter-btn" data-category="2D Clothes">2D</button>
                <button class="filter-btn" data-category="3D Clothes">3D</button>
            </div>

            <div class="filter-group">
                <span class="group-label">Accessories</span>
                <button class="filter-btn" data-category="3D Object">Object</button>
                <button class="filter-btn" data-category="Metal">Metal</button>
            </div>
        </div>
    </div>

    <div class="header-right">
        <select class="sort-select" id="sortSelect">
            <option value="latest">최신순</option>
            <option value="price-high">금액 높은순</option>
            <option value="price-low">금액 낮은순</option>
        </select>
    </div>
</div>

        <div class="request-list">
            <div th:if="${#lists.isEmpty(requestList)}" class="empty-msg">
                <p>등록된 의뢰가 없습니다.</p>
            </div>

            <div class="request-item"
                 th:each="request : ${requestList}"
                 th:data-category="${request.categoryName}"
                 th:data-price="${request.hopePrice}"
                 th:data-date="${request.createdAt}"
                 th:onclick="|location.href='/business/request/detail/' + ${request.requestId}|">

                <img th:src="${request.thumbnailPath ?: '/image/no-image.png'}" class="item-thumbnail">

                <div class="item-info">
                    <div class="item-top-row">
	                        <span class="status-badge"
							      th:classappend="${request.status == 'OPEN' ? 'status-open' :
							                       (request.status == 'PAID' ? 'status-paid' :
							                       (request.status == 'SELECTED' ? 'status-selected' :
							                       (request.status == 'COMPLETED' ? 'status-done' : '')))}"
							      th:text="${request.status == 'OPEN' ? '의뢰중' :
							                (request.status == 'PAID' ? '결제완료' :
							                (request.status == 'SELECTED' ? '낙찰완료' :
							                (request.status == 'COMPLETED' ? '작업완료' : request.status)))}">
							</span>
                    </div>
                    <div class="item-title" th:text="${request.title}">의뢰 제목</div>
                    <div class="item-meta">
                        <span th:text="${request.customerNickname}">작성자</span>
                        <span class="meta-dot">·</span>
                        <span th:text="${#strings.substring(request.createdAt, 0, 10)}">날짜</span>
                    </div>
                </div>

                <div class="item-price">
                    ₩<span th:text="${#numbers.formatInteger(request.hopePrice, 0, 'COMMA')}">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    let currentCategory = 'all';

    function applyFilterAndSort() {
        const sortValue = document.getElementById('sortSelect').value;
        const list = document.querySelector('.request-list');
        const items = Array.from(document.querySelectorAll('.request-item'));

        items.forEach(item => {
            const cat = item.getAttribute('data-category');
            item.style.display = (currentCategory === 'all' || cat === currentCategory) ? 'flex' : 'none';
        });

        const visibleItems = items.filter(i => i.style.display !== 'none');
        const hiddenItems  = items.filter(i => i.style.display === 'none');

        visibleItems.sort((a, b) => {
            if (sortValue === 'price-high') return parseInt(b.dataset.price) - parseInt(a.dataset.price);
            if (sortValue === 'price-low')  return parseInt(a.dataset.price) - parseInt(b.dataset.price);
            return (b.dataset.date || '').localeCompare(a.dataset.date || '');
        });

        [...visibleItems, ...hiddenItems].forEach(item => list.appendChild(item));
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            applyFilterAndSort();
        });
    });

    document.getElementById('sortSelect').addEventListener('change', applyFilterAndSort);
    </script>
</th:block>
</body>
</html>
