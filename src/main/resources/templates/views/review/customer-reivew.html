<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
    <meta charset="UTF-8">
    <title>Nextage | 후기 작성</title>
    <style>
        /* 기존 의뢰 작성 페이지의 CSS 변수와 기본 스타일 그대로 유지 */
        :root {
            --bg: #f5f5f7;
            --border: rgba(0,0,0,0.08);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #bd93f9; /* 후기는 퍼플 톤으로 강조 */
            --accent-soft: rgba(189,147,249,0.1);
            --radius-xl: 22px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-apple: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text-primary); }

        /* 프로그래스 바 */
        .progress-wrap { position: sticky; top: 0; z-index: 200; padding: 16px 24px; background: rgba(245,245,247,0.82); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .progress-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
        .step-dots { display: flex; gap: 6px; }
        .step-dot { width: 6px; height: 6px; border-radius: 50%; background: #aeaeb2; transition: all 0.4s var(--ease-apple); }
        .step-dot.active { width: 20px; border-radius: 3px; background: var(--accent); }
        .step-dot.done { background: var(--accent); }

        .page { max-width: 600px; margin: 0 auto; padding: 60px 24px 180px; }
        .step-section { display: none; }
        .step-section.active { display: block; animation: stepIn 0.5s var(--ease-apple) both; }
        @keyframes stepIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { margin-bottom: 40px; }
        .section-eyebrow { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
        .section-header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }

        /* Step 1: 주문 정보 카드 */
        .order-info-card { background: #fff; border-radius: var(--radius-xl); padding: 30px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-secondary); font-size: 0.9rem; }
        .info-value { font-weight: 600; }

        /* Step 2: 이미지 업로드박스 */
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .image-box { 
            aspect-ratio: 1/1; border: 2px dashed var(--border); border-radius: var(--radius-lg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; background: #fff; transition: all 0.3s;
        }
        .image-box:hover { border-color: var(--accent); background: var(--accent-soft); }
        .image-box i { font-size: 1.5rem; color: var(--text-tertiary); margin-bottom: 5px; }
        .image-box span { font-size: 0.7rem; color: var(--text-tertiary); font-weight: 600; }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Step 3: 텍스트 영역 */
        .apple-textarea { 
            width: 100%; height: 250px; padding: 20px; border-radius: var(--radius-lg);
            border: 1.5px solid var(--border); background: #fff; font-size: 1rem;
            font-family: inherit; outline: none; resize: none; transition: all 0.25s;
        }
        .apple-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

        /* 하단 액션 바 */
        .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 24px 40px; background: rgba(245,245,247,0.8); backdrop-filter: blur(20px); border-top: 1px solid var(--border); }
        .action-bar-inner { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .cta-btn { width: 100%; padding: 18px; border-radius: var(--radius-lg); border: none; background: var(--text-primary); color: #fff; font-weight: 700; cursor: pointer; transition: all 0.3s var(--spring); }
        .cta-btn:hover { background: var(--accent); transform: scale(1.02); }
        .back-link { font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; text-decoration: underline; }

        @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } }
    </style>
</head>
<body>
<th:block layout:fragment="content">
    <div class="progress-wrap">
        <div class="progress-inner">
            <div class="step-dots">
                <div class="step-dot active" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
                <div class="step-dot" id="dot3"></div>
            </div>
            <div class="progress-label" id="stepLabel">Step 1 of 3</div>
        </div>
    </div>

    <div class="page">
        <form id="reviewForm" th:action="@{/customer/review/save}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="orderItemId" th:value="${orderInfo.orderItemId}">
            <input type="hidden" name="businessId" th:value="${orderInfo.businessId}">

            <div class="step-section active" id="step1">
                <div class="section-header">
                    <div class="section-eyebrow">Review Step 1</div>
                    <h2>작업 정보를<br>확인해 주세요</h2>
                </div>
                <div class="order-info-card">
                    <div class="info-row">
                        <span class="info-label">의뢰 제목</span>
                        <span class="info-value" th:text="${orderInfo.requestTitle}">의뢰 제목</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">주문 번호</span>
                        <span class="info-value" th:text="${orderInfo.orderNo}">ORD-12345</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">작업 기간</span>
                        <span class="info-value">
                            <span th:text="${#temporals.format(orderInfo.startDate, 'yy.MM.dd')}"></span> ~ 
                            <span th:text="${#temporals.format(orderInfo.endDate, 'yy.MM.dd')}"></span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="step-section" id="step2">
                <div class="section-header">
                    <div class="section-eyebrow">Review Step 2</div>
                    <h2>멋진 결과물을<br>사진으로 공유해 주세요</h2>
                    <p>최대 3장까지 등록 가능합니다. (첫 번째 사진은 필수입니다)</p>
                </div>
                <div class="image-grid">
                    <label class="image-box" for="file1">
                        <i class="bi bi-camera"></i><span>대표 사진 *</span>
                        <input type="file" id="file1" name="imageFiles" accept="image/*" onchange="preview(this)" required>
                        <img class="preview-img">
                    </label>
                    <label class="image-box" for="file2">
                        <i class="bi bi-plus-lg"></i><span>추가 사진</span>
                        <input type="file" id="file2" name="imageFiles" accept="image/*" onchange="preview(this)">
                        <img class="preview-img">
                    </label>
                    <label class="image-box" for="file3">
                        <i class="bi bi-plus-lg"></i><span>추가 사진</span>
                        <input type="file" id="file3" name="imageFiles" accept="image/*" onchange="preview(this)">
                        <img class="preview-img">
                    </label>
                </div>
            </div>

            <div class="step-section" id="step3">
                <div class="section-header">
                    <div class="section-eyebrow">Review Step 3</div>
                    <h2>상세한 후기를<br>남겨주세요</h2>
                    <p>작업 과정이나 결과물에 대해 자유롭게 적어주세요.</p>
                </div>
                <textarea name="content" class="apple-textarea" placeholder="여기에 내용을 입력하세요..." required></textarea>
            </div>
        </form>
    </div>

    <div class="action-bar">
        <div class="action-bar-inner">
            <button class="cta-btn" id="mainBtn" onclick="nextStep()">계속하기</button>
            <span class="back-link" id="backBtn" style="display:none;" onclick="prevStep()">이전 단계로</span>
        </div>
    </div>

    <script>
        let currentStep = 1;

        function updateUI() {
            // 섹션 전환
            document.querySelectorAll('.step-section').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + currentStep).classList.add('active');

            // 프로그래스 도트
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot' + i);
                dot.classList.remove('active', 'done');
                if (i < currentStep) dot.classList.add('done');
                if (i === currentStep) dot.classList.add('active');
            }

            // 버튼 텍스트 및 이전 버튼 제어
            document.getElementById('stepLabel').innerText = `Step ${currentStep} of 3`;
            document.getElementById('backBtn').style.display = currentStep === 1 ? 'none' : 'block';
            document.getElementById('mainBtn').innerText = currentStep === 3 ? '후기 등록하기' : '계속하기';
            
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function nextStep() {
            if (currentStep === 2) {
                // 사진 필수 체크 (첫 번째 사진)
                if (!document.getElementById('file1').files[0]) {
                    alert('대표 사진을 등록해 주세요.');
                    return;
                }
            }

            if (currentStep < 3) {
                currentStep++;
                updateUI();
            } else {
                // 마지막 단계에서 제출
                const content = document.querySelector('textarea[name="content"]').value.trim();
                if(!content) {
                    alert('후기 내용을 입력해 주세요.');
                    return;
                }
                document.getElementById('reviewForm').submit();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        }

        function preview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const previewImg = input.parentElement.querySelector('.preview-img');
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</th:block>
</body>
</html>
