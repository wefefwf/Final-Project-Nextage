<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/business-layout}">
<head>
    <meta charset="UTF-8">
    <title>Nextage Schedule</title>
    <link rel="stylesheet" th:href="@{/css/schedule/schedule.css}" />
</head>
<body>

<th:block layout:fragment="content">
    <div class="schedule-wrapper">
        <div class="calendar-card">
            <div id="calendar"></div>
        </div>
    
        <div class="status-section">
		    <h3>진행 중인 작업</h3>
		    <div class="status-box">
		        <div th:if="${#lists.isEmpty(todayWork)}" class="empty-msg">
		            <p>진행 중인 작업 내역이 없습니다.</p>
		        </div>
		
		        <div th:unless="${#lists.isEmpty(todayWork)}" th:with="tw=${todayWork[0]}" class="schedule-row">
		            <div class="row-left">
		                <div class="d-day-area">
		                    <span class="badge-blue">진행중</span>
		                </div>
		                <div class="info-area">
		                    <h4 th:text="${tw.requestTitle}">의뢰 제목</h4>
		                    <p class="period-text" th:text="${#temporals.format(tw.createdAt, 'yy.MM.dd')} + ' ~ ' + ${#temporals.format(tw.dueDate, 'yy.MM.dd')}"></p>
		                </div>
		            </div>
		
		            <div class="customer-info" th:text="${tw.customerNickname} + '님'"></div>
		
		            <div class="row-right">
		                <a th:href="@{/business/order/detail/{id}(id=${tw.orderId})}" class="btn-link">상세보기</a>
		            </div>
		        </div>
		    </div>
		</div>
    
        <div class="list-section">
            <h3>내 일정</h3>
            <div class="scroll-container">
            <!-- 일정 없음 -->
			    <div class="empty-schedule-box" th:if="${#lists.isEmpty(scheduleList)}">
			
			        <div class="empty-text-box">
			            <p>아직 일정이 없네요!</p>
			            <p style="margin-bottom:20px;">"제안"하러 갈까요?</p>
			
			            <a th:href="@{/business/request/list}" class="btn-go-list">
			                리스트 보러가기 →
			            </a>
			
			        </div>
			    </div>
			    <div class="schedule-row"
     						th:each="order : ${scheduleList}"
     						th:classappend="${order.dueDate.toLocalDate().isBefore(T(java.time.LocalDate).now())} ? 'past-work'">
			        <div class="row-left">
			            <div class="d-day-area">
			                <span class="d-day-text" 
			                      th:with="days=${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), order.dueDate.toLocalDate())}"
			                      th:text="${days == 0 ? 'D-Day' : (days > 0 ? 'D-' + days : 'D+' + T(java.lang.Math).abs(days))}">
			                </span>
			            </div>
			            <div class="info-area">
			                <h4 th:text="${order.requestTitle}">의뢰 제목</h4>
			                <p class="period-text" th:text="${#temporals.format(order.createdAt, 'yy.MM.dd')} + ' ~ ' + ${#temporals.format(order.dueDate, 'yy.MM.dd')}"></p>
			            </div>
			        </div>
			
			        <div class="customer-info" th:text="${order.customerNickname} + '님'"></div>
			
			        <div class="row-right">
			            <a th:href="@{/business/order/detail/{id}(id=${order.orderId})}" class="btn-link">상세보기</a>
			        </div>
			    </div>
			</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const eventsData = /*[[${scheduleList}]]*/ [];
        
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            fixedWeekCount: false,      
            showNonCurrentDates: false, 
            dayMaxEvents: 3,         
            
            // ★ [수정] Today 버튼 삭제 (center와 right만 남김) ★
            headerToolbar: { 
                left: '', 
                center: 'title', 
                right: 'prev,next' 
            },
            
            // ★ [수정] 날짜 옆 '일' 삭제 및 숫자만 표기 ★
            dayCellContent: function(info) {
                return info.date.getDate();
            },
            
            events: (eventsData || []).map(item => ({
                title: item.requestTitle,
                start: item.createdAt, 
                end: item.dueDate,     
                url: '/business/order/detail/' + item.orderId,
                allDay: true
            }))
        });
        calendar.render();
    });
    </script>
</th:block>
</body>
</html>
