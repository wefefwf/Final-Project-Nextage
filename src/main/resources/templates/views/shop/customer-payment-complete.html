<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
    <meta charset="UTF-8">
    <title>결제 완료 - Nextage</title>
</head>
<body>
<th:block layout:fragment="content">

    <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        font-family: 'Pretendard', sans-serif;
    ">
        <!-- 체크 아이콘 -->
        <div style="
	    width: 90px; height: 90px;
	    background: linear-gradient(135deg, #bd93f9, #a6c1ee);
	    border-radius: 50%;
	    display: flex; align-items: center; justify-content: center;
	    box-shadow: 0 8px 30px rgba(189,147,249,0.4);
	    margin-bottom: 28px;
	    animation: popIn 0.5s ease;
	">
	    <!-- 흰색 체크 SVG -->
	    <svg width="44" height="44" viewBox="0 0 44 44" fill="none"
	         xmlns="http://www.w3.org/2000/svg">
	        <polyline points="8,22 18,34 36,12"
	                  stroke="white"
	                  stroke-width="4.5"
	                  stroke-linecap="round"
	                  stroke-linejoin="round"/>
	    </svg>
	</div>

        <!-- 완료 메시지 -->
        <div style="
            font-family: 'Montserrat', sans-serif;
            font-size: 28px; font-weight: 900;
            color: #222; margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.1s both;
        ">결제가 완료되었습니다!</div>

        <!-- 주문 번호 -->
        <div style="
            font-size: 13px; color: #aaa;
            margin-bottom: 8px;
            animation: fadeUp 0.5s ease 0.2s both;
        ">
            주문번호 :
            <span th:text="${orderNo}"
                  style="color:#bd93f9; font-weight:700;"></span>
        </div>

        <!-- 결제 금액 -->
        <div style="
            font-size: 13px; color: #aaa;
            margin-bottom: 36px;
            animation: fadeUp 0.5s ease 0.25s both;
        ">
            결제 금액 :
            <span th:text="${#numbers.formatInteger(totalAmount, 3, 'COMMA') + '원'}"
                  style="color:#222; font-weight:700;"></span>
        </div>

        <!-- 리다이렉트 안내 -->
        <div style="
            font-size: 14px; color: #bbb;
            margin-bottom: 24px;
            animation: fadeUp 0.5s ease 0.3s both;
        ">
            <span id="countDown" style="color:#bd93f9; font-weight:700;">5</span>
            초 후 자동으로 이동합니다.
        </div>

        <!-- 버튼 -->
        <div style="
            display: flex; gap: 12px;
            animation: fadeUp 0.5s ease 0.35s both;
        ">
            <button onclick="location.href='/customer/shop'" style="
                padding: 14px 28px;
                font-size: 14px; font-weight: 700; color: #fff;
                background: linear-gradient(135deg, #bd93f9, #a6c1ee);
                border: none; border-radius: 50px; cursor: pointer;
                box-shadow: 0 4px 16px rgba(189,147,249,0.35);
                transition: all 0.3s;
            "
            onmouseover="this.style.transform='translateY(-2px)'"
            onmouseout="this.style.transform='translateY(0)'">
                쇼핑 계속하기
            </button>
            <button onclick="location.href='/cart'" style="
                padding: 14px 28px;
                font-size: 14px; font-weight: 700; color: #888;
                background: #fff;
                border: 1.5px solid #ebebeb; border-radius: 50px; cursor: pointer;
                transition: all 0.3s;
            "
            onmouseover="this.style.borderColor='#bd93f9'; this.style.color='#bd93f9';"
            onmouseout="this.style.borderColor='#ebebeb'; this.style.color='#888';">
                장바구니로 이동
            </button>
        </div>
    </div>

    <style>
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script th:inline="javascript">
    /*<![CDATA[*/
        // 리다이렉트 대상 — 결제 전 페이지로 돌아감 (기본: 구매내역)
        var redirectUrl = /*[[${redirectUrl}]]*/ '/order/history';

        var count = 5;
        var timer = setInterval(function() {
            count--;
            document.getElementById('countDown').textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                location.href = redirectUrl;
            }
        }, 1000);
    /*]]>*/
    </script>

</th:block>
</body>
</html>
