<div th:fragment="paymentModal">
  <div id="payment-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closePaymentModal()">&times;</span>
      <h2>결제하기</h2>
      <p id="product-name">상품명</p>
      <p id="product-price">가격: 0원</p>

      <input type="text" id="buyer-name" placeholder="이름" />
      <input type="text" id="buyer-phone" placeholder="전화번호" />
      <button id="pay-button">결제하기</button>
    </div>
  </div>

  <style>
    .modal {
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      text-align: center;
    }
    .close {
      float: right;
      font-size: 24px;
      cursor: pointer;
    }
  </style>

  <script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
  <script>
    let currentProduct = {};

    function openPaymentModal(product) {
      currentProduct = product;
      document.getElementById('product-name').innerText = product.name;
      document.getElementById('product-price').innerText = '가격: ' + product.price.toLocaleString() + '원';
      document.getElementById('payment-modal').style.display = 'block';
    }

    function closePaymentModal() {
      document.getElementById('payment-modal').style.display = 'none';
    }

    document.getElementById('pay-button').addEventListener('click', function() {
      const IMP = window.IMP;
      IMP.init('YOUR_IMP_MERCHANT_ID'); // 아임포트 가맹점 코드

      IMP.request_pay({
        pg: 'html5_inicis', // 예시 PG사
        pay_method: 'card',
        merchant_uid: 'mid_' + new Date().getTime(),
        name: currentProduct.name,
        amount: currentProduct.price,
        buyer_name: document.getElementById('buyer-name').value,
        buyer_tel: document.getElementById('buyer-phone').value,
      }, function(rsp) {
        if (rsp.success) {
          alert('결제 성공! 결제번호: ' + rsp.imp_uid);
          closePaymentModal();
        } else {
          alert('결제 실패: ' + rsp.error_msg);
        }
      });
    });
  </script>
</div>
