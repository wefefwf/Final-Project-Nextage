<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/customer-layout}">
<head>
    <meta charset="UTF-8">
    <title>Nextage Kit Shop Detail</title>
    <link rel="stylesheet" th:href="@{/css/customerShop/customerShopDetail.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
</head>
<body>
<th:block layout:fragment="content">
    <div class="shop-detail-container">
        <div class="detail-header">
            <h1 th:text="${kit.name}">상품명</h1>
        </div>

        <div class="admin-action-row">
            <a th:href="@{/customer/shop/edit(id=${kit.kitId}, page=${page})}" class="btn-edit">상품 업데이트</a>
            <button type="button" class="btn-delete" th:onclick="|deleteKit(${kit.kitId})|">상품 삭제</button>
        </div>

        <div class="product-main-row">
            <div class="main-visual-col">
                <div class="slick-wrapper">
                    <div class="slick-item"><img th:src="${kit.mainImage1}" alt="메인 이미지 1"></div>
                    <div th:if="${kit.mainImage2 != null}" class="slick-item">
                        <img th:src="${kit.mainImage2}" alt="메인 이미지 2">
                    </div>
                </div>
            </div>

            <div class="product-info-col">
                <div class="info-content-box">
                    <p class="reg-date-text">등록일: <span th:text="${#temporals.format(kit.createdAt, 'yyyy-MM-dd')}">2026-03-11</span></p>

                    <p class="manufacturer-text" th:text="${kit.manufacturer}">제조사명</p>
                    <p class="product-name-display" th:text="${kit.name}">상품명</p>
                    
                    <div class="info-bottom-group">
                        <h2 class="price-text"><span th:text="${#numbers.formatInteger(kit.price, 0, 'COMMA')}">0</span>원</h2>
                        <p class="stock-text">남은 수량: <span th:text="${kit.stock}">0</span>개</p>

                        <div class="purchase-btn-group">
                        	<!-- 수량 0개 이상 -->
						    <th:block th:if="${kit.stock > 0}">
						        <button class="btn-cart">장바구니 추가</button>
						        <button class="btn-buy">바로 결제하기</button>
						    </th:block>
							<!-- 수량 0개 -->
						    <th:block th:if="${kit.stock == 0}">
						        <button class="btn-cart" th:onclick="|addToCart(${kit.kitId})|">장바구니 추가</button>
						        <button class="btn-buy" onclick="buyNow()">바로 결제하기</button>
						    </th:block>
						</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="detail-image-row">
            <div class="detail-img-wrapper">
                <img th:src="${kit.detailImage}" alt="상세 설명 이미지">
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script>
    $(document).ready(function(){
        setTimeout(function() {
            var $wrapper = $('.slick-wrapper');
            if ($wrapper.hasClass('slick-initialized')) {
                $wrapper.slick('unslick');
            }
            $wrapper.slick({
                dots: true,
                infinite: true,
                speed: 500,
                fade: true,
                cssEase: 'linear',
                autoplay: true,
                autoplaySpeed: 2000,
                arrows: true,
                prevArrow: '<button type="button" class="slick-prev">〈</button>',
                nextArrow: '<button type="button" class="slick-next">〉</button>'
            });
        }, 300); 
    });

    function deleteKit(id) {
        if(confirm("정말로 이 상품을 삭제하시겠습니까?")) {
            location.href = "/customer/shop/delete?id=" + id;
        }
    }
    

    function addToCart(kitId) {

        fetch('/cart/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                kitId: kitId,
                quantity: 1
            })
        })
        .then(res => {
            if(res.ok){
                if(confirm("장바구니에 추가되었습니다. 장바구니로 이동하시겠습니까?")){
                    location.href = "/cart";
                }
            } else {
                alert("장바구니 추가 실패");
            }
        })
        .catch(err => {
            console.error(err);
            alert("오류 발생");
        });
    }
	
    function buyNow() {
	
    	const itemName = /*[[${kit.name}]]*/ '상품명';
        const itemPrice = /*[[${kit.price}]]*/ 0;
        
        const item = {
                name: itemName,
                price: itemPrice,
                quantity: 1
            };

    	const items = [item];
    	const total = item.price;

    	openPaymentModal(items, total, []);
    	}

    </script>
    <th:block th:replace="~{views/shop/customer-payment :: customerPayment}"></th:block>
</th:block>
</body>
</html>
